                                  rule_id:
                                    type: string
                                  rule_name:
                                    type: string
                                  type:
                                    type: string
                                    enum: [percentage, fixed_amount, fixed_price, markup]
                                  value:
                                    type: number
                                  amount:
                                    type: number
                            final_price:
                              type: number
                              description: Final price after all discounts
                            currency_conversion:
                              type: object
                              nullable: true
                              description: Currency conversion details (null if no conversion)
                              properties:
                                from_currency:
                                  type: string
                                to_currency:
                                  type: string
                                rate:
                                  type: number
                                converted_amount:
                                  type: number
                  total:
                    type: integer
                    description: Total number of products matching filters
                  limit:
                    type: integer
                    description: Number of products per page
                  offset:
