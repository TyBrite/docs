    get:
      operationId: listSubcategories
      tags:
        - Taxonomy
      summary: List subcategories
      description: Retrieve product subcategories. Subcategories can be nested to arbitrary depth via their parent_id. By default a flat list is returned; use tree=true to receive them as a nested hierarchy, or parent_id / root_only to fetch a specific level. Accepts both publishable and secret API keys. When called with a marketplace operator key, returns subcategories aggregated across all merchants in the marketplace. With a marketplace operator key, pass `?store_id=<merchant>` to narrow results to a single merchant.
      security:
        - BearerAuth: []
      parameters:
        - name: store_id
          in: query
          required: false
          description: Marketplace operator key only. Narrow the aggregated marketplace subcategories to a single merchant. Ignored when using a single-store key.
          schema:
            type: string
            format: uuid
        - name: category_id
          in: query
          description: Filter subcategories by parent category ID
          schema:
            type: string
            format: uuid
        - name: parent_id
          in: query
          description: Return only the direct children of the given subcategory. Pass the literal value null to return only top-level subcategories (those with no parent).
          schema:
            type: string
            format: uuid
        - name: root_only
          in: query
          description: When true, return only top-level subcategories (those with no parent). Useful for rendering the first level of a category's subcategory hierarchy.
          schema:
            type: boolean
            default: false
        - name: tree
          in: query
          description: 'When true, return subcategories as a nested hierarchy: each subcategory includes a children array of its nested subcategories. The response is not paginated in this mode — the full tree is returned in one call.'
          schema:
            type: boolean
            default: false
        - name: search
          in: query
          description: Case-insensitive substring match on subcategory name
          schema:
            type: string
        - name: active
          in: query
          description: Filter by active status. Defaults to true (only active subcategories) when omitted.
          schema:
            type: boolean
            default: true
        - name: limit
          in: query
          description: Maximum number of results to return
          schema:
            type: integer
            default: 100
            minimum: 1
            maximum: 500
        - name: cursor
          in: query
          description: Cursor for pagination (base64-encoded)
          schema:
            type: string
        - name: fields
          in: query
          schema:
            type: string
          description: Comma-separated list of fields to include in the response.
          example: id,name
      responses:
        '200':
          description: Success
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
