        **Field Filtering:**
        - Root-level filtering: Reduce top-level fields
        - Nested variant filtering: Filter specific variant fields using dot notation
        - Example: `fields=name,price_range,variants.sku,variants.display_price,variants.stock`
        - Bandwidth reduction: Up to 55% with nested filtering
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: Product slug (SEO-friendly URL identifier)
          example: sony-wh-1000xm4-a089d
        - name: fields
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of fields to return (reduces bandwidth by up to 55%).
              
            **Root-level fields:** product_id, name, brand, description, total_stock, price_range, 
            has_variants, variant_count, base_currency, display_currency, currency_symbol, exchange_rate
              
            **Variant fields (use dot notation):** variants.variant_id, variants.sku, variants.display_price, 
            variants.stock, variants.variant_attributes, variants.price_breakdown, variants.price_breakdown.*
              
            **Example (35% reduction):** `fields=product_id,name,brand,total_stock,price_range,variants`
              
            **Example (55% reduction):** `fields=name,price_range,variants.sku,variants.display_price,variants.stock`
          example: name,price_range,variants.sku,variants.display_price,variants.price_breakdown
        - name: place_name
          in: query
          schema:
            type: string
          description: |
            City or region name for geographic currency detection.
              
            **Works with variants:** All variant prices converted to detected currency.
              
            **Examples:**
            - `place_name=New York` → USD
            - `place_name=London, UK` → GBP
            - `place_name=Nairobi, Kenya` → KES
          example: London, UK
        - name: latitude
          in: query
          schema:
            type: number
            format: double
          description: |
            Customer latitude for precise currency detection (use with longitude).
              
            **Works with variants:** All variant prices converted based on detected region.
          example: 51.5074
        - name: longitude
          in: query
          schema:
            type: number
            format: double
          description: Customer longitude for precise currency detection (use with latitude)
          example: -0.1278
        - name: location
          in: query
          schema:
            type: string
          description: |
            **DEPRECATED:** Use `place_name` instead.
              
            Location/country for location-based pricing
          deprecated: true
        - name: region
          in: query
          schema:
            type: string
          description: Manual region override for pricing rules
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
          description: |
            Customer UUID for personalized pricing.

            When provided, the worker resolves the customer's RFM segment and tier
            server-side (from the customers + customer_stores tables) and feeds them
            into pricing rule evaluation. There is no need to pass segment/tier directly.
        - name: quantity
          in: query
          schema:
            type: integer
            minimum: 1
          description: Quantity for volume-based pricing
      responses:
        '200':
          description: |
            Successfully retrieved product with dynamic pricing and currency conversion.

            **Response Structure:**
            - Simple products: Flat structure with pricing at root
            - Multi-variant products: Hierarchical with variants array, each variant has own pricing

            **Response includes:**
            - Product details with converted prices
            - Price breakdown showing discounts per variant
            - Pricing context with currency and region info
            - Aggregate price_range for multi-variant products
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                type: object
                properties:
                  product_id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  description:
                    type: string
                  brand:
                    type:
                      - string
                      - 'null'
                  category_name:
                    type:
                      - string
                      - 'null'
                  images:
                    type: array
                    items:
                      type: string
                  product_slug:
                    type:
                      - string
                      - 'null'
                  thumbnail_url:
                    type:
                      - string
                      - 'null'
                    description: Primary image URL for list views
                  media:
                    type: array
                    description: Array of product media objects
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        url:
                          type: string
                        type:
                          type: string
                        position:
                          type: integer
                        alt_text:
                          type:
                            - string
                            - 'null'
                        is_primary:
                          type: boolean
                  variant_id:
                    type:
                      - string
                      - 'null'
                    format: uuid
                    description: Only present for simple products
                  sku:
                    type:
                      - string
                      - 'null'
                    description: Only present for simple products
                  stock:
                    type:
                      - integer
                      - 'null'
                    description: Only present for simple products
                  base_price:
                    type:
                      - number
                      - 'null'
                    description: Price in store's base currency (only for simple products)
                  resolved_price:
                    type:
                      - number
                      - 'null'
                    description: Price after discounts before conversion (only for simple products)
                  display_price:
                    type:
                      - number
                      - 'null'
                    description: Final price in customer's currency (only for simple products)
                  price_breakdown:
                    type:
                      - object
                      - 'null'
                    description: Detailed price calculation (only for simple products)
                    properties:
                      base_price:
                        type: number
                      discounts:
                        type: array
                        items:
                          type: object
                          properties:
                            rule_id:
                              type: string
                            rule_name:
                              type: string
                            type:
                              type: string
                            value:
                              type: number
                            amount:
                              type: number
                      final_price:
                        type: number
                      currency_conversion:
                        type:
                          - object
                          - 'null'
                        properties:
                          from_currency:
                            type: string
                          to_currency:
                            type: string
                          rate:
                            type: number
                          converted_amount:
                            type: number
                  total_stock:
                    type:
                      - integer
                      - 'null'
                    description: Sum of stock across all variants (only for multi-variant)
                  price_range:
                    type:
                      - object
                      - 'null'
                    description: Price range calculated from variant display_prices (only for multi-variant)
                    properties:
                      min:
                        type: number
                        description: Minimum display price across variants
                      max:
                        type: number
                        description: Maximum display price across variants
                  has_variants:
                    type: boolean
                    description: Whether product has multiple variants
                  variant_count:
                    type:
                      - integer
                      - 'null'
                    description: Number of variants (only for multi-variant)
                  variants:
                    type:
                      - array
                      - 'null'
                    description: Array of variants with pricing (only for multi-variant)
                    items:
                      type: object
                      properties:
                        variant_id:
                          type: string
                          format: uuid
                        sku:
                          type: string
                        stock:
                          type: integer
                        variant_attributes:
                          type: object
                          additionalProperties: true
                        variant_name:
                          type:
                            - string
                            - 'null'
                        is_default:
                          type: boolean
                        media:
                          type: array
                          description: Array of variant-specific media objects
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                                format: uuid
                              url:
                                type: string
                              type:
                                type: string
                              position:
                                type: integer
                              alt_text:
                                type:
                                  - string
                                  - 'null'
                              is_primary:
                                type: boolean
                        base_price:
                          type: number
                          description: Price in store's base currency
                        resolved_price:
                          type: number
                          description: Price after discounts before conversion
                        display_price:
                          type: number
                          description: Final price in customer's currency
                        price_breakdown:
                          type: object
                          description: Detailed price calculation for this variant
                          properties:
                            base_price:
                              type: number
                            discounts:
                              type: array
                              items:
                                type: object
                                properties:
                                  rule_id:
                                    type: string
                                  rule_name:
                                    type: string
                                  type:
                                    type: string
                                  value:
                                    type: number
                                  amount:
                                    type: number
                            final_price:
                              type: number
                            currency_conversion:
                              type:
                                - object
                                - 'null'
                              properties:
                                from_currency:
                                  type: string
                                to_currency:
                                  type: string
                                rate:
                                  type: number
                                converted_amount:
                                  type: number
                  base_currency:
                    type: string
                    description: Store's base currency code
                    example: USD
                  display_currency:
                    type: string
                    description: Customer's currency code
                    example: GBP
                  currency_symbol:
                    type: string
                    description: Currency symbol for display
                    example: £
                  exchange_rate:
