tags:
  - name: System
    description: API information and health checks
  - name: Authentication
    description: |
      Customer authentication and session management.
      
      **⚠️ SECRET KEY REQUIRED**: All authentication endpoints require a secret key (tybrite_sk_*).
      Publishable keys will return 403 Forbidden.
      
      These endpoints manage customer accounts, login sessions, password resets, and OTP verification.
      Use these to build customer-facing authentication flows in your storefront.
      
      **Special Headers:**
      - `x-auth-token`: Required for `GET /v1/auth/me` and `POST /v1/auth/update-password`
      - Contains the authentication token from login/register response
      - Token expires after session timeout (default 1 hour)
      
      **Rate Limiting:**
      - All authentication endpoints: 10 requests/minute per IP address
      - Prevents brute force attacks on customer accounts
  - name: Products
    description: Product catalog management
  - name: Orders
    description: |
      Order lifecycle management with automatic inventory sync and accounting.
      
      **Special Headers:**
      - `Idempotency-Key`: **REQUIRED** for `POST /v1/orders`
      - Prevents duplicate order creation on network retries
      - Recommended format: `order-{date}-{unique-id}`
      - Stored for 24 hours
      - Retrying with same key returns existing order (not counted against rate limit)
      
      **Automatic Processing:**
      - Inventory automatically decremented on order creation
      - Double-entry accounting journal entries created automatically
      - Payment status tracked and updated via webhooks
  - name: Customers
    description: Customer profile management
  - name: Cart & Wishlist
    description: |
      Shopping cart and wishlist operations with anonymous session support.
      
      **Special Headers:**
      - `X-Session-Id`: Optional header for anonymous cart functionality
      - Generate a unique session ID on the client (UUID or random string)
      - Store in localStorage/sessionStorage for persistence
      - When customer logs in, migrate cart by providing `customer_id` instead
      
      **Cart Association:**
      - If `X-Session-Id` provided: Cart associated with session (anonymous)
      - If `customer_id` provided: Cart associated with customer account
      - If both provided: `customer_id` takes precedence
      - If neither provided: Returns 400 error
      
      **Use Cases:**
      - Anonymous browsing: Use `X-Session-Id` before customer authentication
      - Logged-in customers: Use `customer_id` parameter
      - Cart migration: Switch from session to customer_id after login
  - name: Search
    description: |
      Semantic search with AI embeddings and simple text search.
      
      **Key Type Support:**
      - `GET /v1/search` (simple text search): Both secret and publishable keys allowed
      - `POST /v1/search` (semantic search): Both secret and publishable keys allowed
      
      Note: Despite using POST method, semantic search is a read-only operation and works
      with publishable keys. The POST method is used to support complex request bodies.
  - name: Recommendations
    description: |
      AI-powered product recommendations using semantic embeddings and collaborative filtering.
      
      **⚠️ SECRET KEY REQUIRED**: Recommendation generation requires a secret key (tybrite_sk_*).
      Publishable keys will return 403 Forbidden.
      
      This restriction protects the computational resources and AI model access used for
      generating personalized recommendations.
  - name: Taxonomy
    description: Categories and subcategories
  - name: CMS
    description: Content management (posts, lookbooks)
  - name: Payments
    description: |
      Multi-provider payment processing (Stripe, Paystack, M-Pesa, Airtel Money).
      
      **Key Type Requirements:**
      - `GET /v1/payments/methods`: Both secret and publishable keys allowed
      - `POST /v1/payments/initialize`: Secret key required
      - `POST /v1/payments/verify`: **SECRET KEY REQUIRED** (read operation but sensitive)
      
      Payment verification requires a secret key because it accesses sensitive payment status
      information that should not be exposed to client-side code.
      
      **Rate Limiting:**
      - Payment initialization has an additional rate limit of 100 requests/hour per API key
      - This is on top of the global rate limits (1,000/hour for publishable keys, 10,000/hour for secret keys)
      - Prevents payment spam and fraud attempts
  - name: Shipping
    description: Shipping zones and delivery cost calculation
  - name: Pricing
    description: Dynamic pricing engine
  - name: Promotions
    description: Marketing promotions and discounts
  - name: Gift Cards
    description: Gift card management
  - name: Messaging
    description: Real-time customer support messaging
security:
  - BearerAuth: []
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        **API Key Authentication**
        
        Use your API key in the Authorization header:
        ```
        Authorization: Bearer tybrite_sk_live_YOUR_KEY
        ```
        
        **Key Types:**
        
        **Secret Keys (Server-Side Only):**
        - Format: `tybrite_sk_live_*` (production) or `tybrite_sk_test_*` (sandbox)
        - Full read/write access to all endpoints
        - ⚠️ NEVER expose in client-side code or public repositories
        - Required for: write operations, authentication, payment verification, AI recommendations
        
        **Publishable Keys (Client-Safe):**
        - Format: `tybrite_pk_live_*` (production) or `tybrite_pk_test_*` (sandbox)
        - Read-only access (GET requests only, plus POST semantic search)
        - ✅ Safe for client-side JavaScript, mobile apps, and public code
        - Allowed for: browsing products, search, CMS content, pricing queries
        
        **Endpoint-Specific Requirements:**
        - **Authentication endpoints** (`/v1/auth/*`): Secret key required
        - **Payment verification** (`POST /v1/payments/verify`): Secret key required
        - **AI Recommendations** (`POST /v1/recommendations`): Secret key required
        - **Semantic Search** (`POST /v1/search`): Both key types allowed (read-only operation)
        - **All write operations**: Secret key required
        - **All read operations**: Both key types allowed
        
        Using a publishable key for restricted operations returns 403 Forbidden.
  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: invalid_request
            message:
              type: string
              example: Missing required field
            details:
              type: string
              example: The 'email' field is required
    Product:
      type: object
      description: Represents a product in the catalog with both physical and online attributes.
      properties:
        product_id:
          type: string
          format: uuid
          example: d8cea277-9bb6-4942-b9e9-2f2ac351509f
        variant_id:
          type: string
          format: uuid
          nullable: true
          example: cc35d16b-fca5-4faa-8699-d3d5d3521bca
        name:
          type: string
          example: Apple MacBook Pro
        online_name:
          type: string
          nullable: true
          description: Name used for online display if different from internal name
          example: MacBook Pro 13" M2
        sku:
          type: string
          example: APP-MBP-13
        description:
          type: string
          example: 13-inch MacBook Pro with M2 chip
        online_description:
          type: string
          nullable: true
          description: Rich text description for online store
        price:
          type: number
          description: Base price
          example: 1899.99
        online_price:
          type: number
          nullable: true
          description: Price displayed online
          example: 1899.99
        online_sale_price:
          type: number
          nullable: true
          description: Discounted price for online store
          example: 1799.99
        compare_at_price:
          type: number
          nullable: true
          description: Original price for comparison (strikethrough price)
        stock:
          type: integer
          description: Physical stock count
          example: 39
        online_stock:
          type: integer
          description: Stock available for online sales
          example: 30
        image:
          type: string
          format: uri
          description: Primary product image URL (legacy/POS)
          example: https://images.unsplash.com/photo-1517336714731-489689fd1ca8
        images:
          type: array
          items:
            type: string
            format: uri
          description: Array of image URLs (legacy)
        online_images:
          type: array
          items:
            type: string
            format: uri
          description: Array of image URLs for online store
        product_slug:
          type: string
          example: apple-macbook-pro-d8cea
        is_online_enabled:
          type: boolean
          example: true
        is_active:
          type: boolean
          example: true
        has_variants:
          type: boolean
          example: false
        tracking_mode:
          type: string
          enum: [quantity, status, none]
          example: quantity
        threshold:
          type: integer
          description: Low stock threshold
          example: 5
        brand:
          type: string
          example: Apple
        barcode:
          type: string
        barcode_type:
          type: string
        category_id:
          type: string
          format: uuid
        category_name:
          type: string
          example: Laptops
        subcategory_id:
          type: string
          format: uuid
        subcategory_name:
          type: string
        online_category:
          type: string
          description: Merged category/subcategory string
        tags:
          type: array
          items:
            type: string
          example: ["laptop", "apple", "m2"]
        attributes:
          type: object
          additionalProperties: true
          description: Key-value pairs of product attributes
          example: { "color": "Space Gray", "memory": "16GB" }
        variant_attributes:
          type: object
          nullable: true
          description: Specific attributes for this variant
        shipping_info:
          type: object
          properties:
            weight:
              type: number
            dimensions:
              type: object
              properties:
                length: { type: number }
                width: { type: number }
                height: { type: number }
        seo_title:
          type: string
        seo_description:
          type: string
        seo_keywords:
          type: array
          items:
            type: string
        featured:
          type: boolean
        featured_order:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        display_currency:
          type: string
          description: Store's default currency code
          example: USD
        currency_symbol:
          type: string
          description: Currency symbol
          example: $
        base_price:
          type: number
          description: Calculated base price from pricing engine
        resolved_price:
          type: number
          description: Final calculated price including discounts/rules
        price_breakdown:
          type: object
          description: Detailed breakdown of price calculation rules
    ProductCollection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Summer Sale
        slug:
          type: string
          example: summer-sale
        description:
          type: string
        collection_type:
          type: string
          enum: [manual, automated, smart]
        is_active:
          type: boolean
        show_on_homepage:
          type: boolean
        display_priority:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Electronics
        description:
          type: string
        active:
          type: boolean
          description: Whether the category is active
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Subcategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        name:
          type: string
          example: Smartphones
        description:
          type: string
        active:
          type: boolean
          description: Whether the subcategory is active
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        order_number:
          type: string
          example: ORD-2026-001234
        customer_id:
          type: string
          format: uuid
        customer_email:
          type: string
          format: email
        customer_phone:
          type: string
        customer_name:
          type: string
        order_status:
          type: string
          enum:
            - pending
            - processing
            - shipped
            - delivered
            - cancelled
          example: pending
        payment_status:
          type: string
          enum:
            - pending
            - paid
            - failed
            - refunded
          example: pending
        payment_method:
          type: string
          enum:
            - stripe
            - paystack
            - mpesa
            - airtel
            - cash
            - bank_transfer
          description: Method used for payment
          example: stripe
        payment_reference:
          type: string
        subtotal:
          type: number
          format: float
          example: 1999.98
        tax_amount:
          type: number
          format: float
          example: 159.99
        shipping_amount:
          type: number
          format: float
          example: 15
        discount_amount:
          type: number
          format: float
          example: 0
        total_amount:
          type: number
          format: float
          example: 2174.97
        billing_address:
          $ref: "#/components/schemas/Address"
        shipping_address:
          $ref: "#/components/schemas/Address"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        notes:
          type: string
        tracking_number:
          type: string
        estimated_delivery:
          type: string
          format: date-time
        shipped_at:
          type: string
          format: date-time
        delivered_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        shipping_metadata:
          type: object
          nullable: true
          description: Complete shipping calculation details for audit trail
          properties:
            fee:
              type: number
              format: float
              description: Calculated shipping fee
              example: 100
            zone_name:
              type: string
              nullable: true
              description: Delivery zone name (if zone-based pricing)
              example: CBD Zone
            tier_name:
              type: string
              nullable: true
              description: Pricing tier name (if distance-based pricing)
              example: Within Nairobi
            distance_meters:
              type: number
              format: float
              nullable: true
              description: Calculated distance from store (if distance-based)
              example: 19.23
            is_free:
              type: boolean
              description: Whether free delivery was applied
              example: false
            reason:
              type: string
              description: Human-readable explanation of fee
              example: 19 m away
            applied_rule:
              type: string
              enum:
                - zone
                - distance
                - default
              description: Which pricing system was applied
              example: distance
    OrderItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        online_product_id:
          type: string
          format: uuid
        product_name:
          type: string
        product_sku:
          type: string
        quantity:
          type: integer
          example: 2
        unit_price:
          type: number
          format: float
          example: 999.99
        subtotal:
          type: number
          format: float
          example: 1999.98
    Address:
      type: object
      properties:
        street:
          type: string
