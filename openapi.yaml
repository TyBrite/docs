    post:
      operationId: createReturn
      tags:
        - Returns
      summary: Lodge a return
      description: |
        Lodges a return request against one of the authenticated customer's own
        online orders. The return is created with `status: "pending"` for the
        merchant to review.

        **Authentication:** API key in the `Authorization: Bearer` header **and** a
        customer session — either `x-auth-token` or `x-external-auth`.

        **Order ownership:** `order_id` must reference an online order belonging to
        the authenticated customer, and each `items[].order_item_id` must be a line
        on that order. An order that does not exist or does not belong to the
        customer returns `404`.

        **Reason description:** `reason_description` is required only when
        `reason_code` is `other`; for every other reason it is optional.

        **Returns availability:** if the store has returns turned off, the request
        returns `422` with code `returns_disabled`.

        After lodging a return the customer can only track its status — approving,
        issuing refunds or store credit, restocking, and rejecting items are
        handled by the merchant in their admin.
      security:
        - BearerAuth: []
      parameters:
        - name: x-auth-token
          in: header
          required: false
          schema:
            type: string
          description: |
            Customer session token from `POST /v1/auth/login` or
            `POST /v1/auth/verify-otp`. Provide this **or** `x-external-auth`.
        - name: x-external-auth
          in: header
          required: false
          schema:
            type: string
          description: |
            Bring-your-own-auth assertion identifying the customer. Provide this
            **or** `x-auth-token`.
        - name: store_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            **Marketplace operator key only — and required for operator keys.** On a
            marketplace storefront, the merchant the order belongs to. Ignored for
            single-store keys.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - order_id
                - reason_code
                - items
              properties:
                order_id:
                  type: string
                  format: uuid
                  description: The customer's online order the return is for.
                  example: 770a0622-0401-63f6-c938-557766551111
                reason_code:
                  type: string
                  enum:
                    - damaged
                    - defective
                    - wrong_item
                    - not_as_described
                    - wrong_size
                    - no_longer_needed
                    - arrived_late
                    - other
                  description: Why the items are being returned.
                  example: damaged
                reason_description:
                  type: string
                  description: |
                    Free-text explanation. **Required when `reason_code` is `other`**;
                    optional otherwise.
                  example: The box was crushed in transit.
                return_type:
                  type: string
                  enum:
                    - full_refund
                    - partial_refund
                    - exchange
                    - store_credit
                  default: full_refund
                  description: The resolution the customer is requesting.
                  example: full_refund
                items:
                  type: array
                  minItems: 1
                  description: The order lines being returned.
                  items:
                    type: object
                    required:
                      - order_item_id
                      - quantity
                    properties:
                      order_item_id:
                        type: string
                        format: uuid
                        description: A line item on the referenced order.
                        example: 9c4f1d2e-aaaa-bbbb-cccc-1234567890ab
                      quantity:
                        type: integer
                        minimum: 1
                        description: How many units of this line are being returned.
                        example: 1
                      condition:
                        type: string
                        enum:
                          - sellable
                          - damaged
                          - defective
                          - expired
                        default: sellable
                        description: The condition the item is being returned in.
                        example: damaged
                      media:
                        type: array
                        items:
                          type: string
                          format: uri
                        description: Optional photo or video URLs evidencing the return.
                        example:
                          - https://media.tybritelabs.com/return-photo-1.jpg
            example:
              order_id: 770a0622-0401-63f6-c938-557766551111
              reason_code: damaged
              return_type: full_refund
              items:
                - order_item_id: 9c4f1d2e-aaaa-bbbb-cccc-1234567890ab
                  quantity: 1
                  condition: damaged
                  media:
                    - https://media.tybritelabs.com/return-photo-1.jpg
      responses:
        '201':
          description: Return lodged
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Return'
              example:
                data:
                  id: 1adc3367-bbc5-4a44-a8a4-9b2484a96454
                  return_number: RET-20260620-25f5f8
                  order_id: 0bce8f80-1f44-434c-8e1b-a1203b1a3377
                  channel: online
                  status: pending
                  return_type: full_refund
                  reason_code: damaged
                  reason_description: null
                  total_return_amount: 299
                  refund_amount: 299
                  refund_method: null
                  created_at: '2026-06-20T13:49:26.887932+00:00'
                  processed_at: null
                  credit_offer:
                    status: none
                    amount: null
                  items:
                    - id: b29e5c83-6278-43fd-92d9-d9fbd62b5400
                      order_item_id: 50a12a84-4f95-4e46-84d2-8e6df748c3f5
                      product_name: Samsung Galaxy Watch 6
                      quantity: 1
                      unit_price: 299
                      return_amount: 299
                      condition: damaged
                      status: pending
                      rejection_reason: null
                      media: []
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '422':
          description: Returns are not enabled for this store.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
