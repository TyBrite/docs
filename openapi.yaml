                          type: object
                          properties:
                            rule_id:
                              type: string
                            rule_name:
                              type: string
                            type:
                              type: string
                            value:
                              type: number
                            amount:
                              type: number
                      final_price:
                        type: number
                      currency_conversion:
                        type:
                          - object
