  /v1/gift-cards:
    get:
      operationId: listGiftCards
      tags:
        - Gift Cards
      summary: List gift cards
      description: |
        Retrieve gift cards belonging to a specific customer, scoped to the authenticated store.

        Only **active**, non-zero balance, non-expired gift cards are returned (sorted by balance descending).
        Accessible with both publishable (`tybrite_pk_*`) and secret (`tybrite_sk_*`) API keys.

        Responses are cached at the edge for ~60s and support ETag revalidation via `If-None-Match`.
      security:
        - BearerAuth: []
      parameters:
        - name: x-auth-token
          in: header
          required: false
          description: Customer session access_token from /v1/auth/login or /v1/auth/verify-otp. Required when customer_id is supplied so the gateway can prove the caller owns that customer record.
          schema:
            type: string
        - name: customer_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Filter gift cards by customer ID. Required for listing a customer's gift cards.
        - name: fields
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of fields to include in the response.

            **Allowed Fields:**
            - `id`, `code`, `value`, `balance`, `status`, `type`
            - `expiry_date`, `customer_id`, `issued_to`, `issued_date`, `last_used`
            - `minimum_purchase_amount`, `maximum_usage_percentage`, `usage_restrictions`
            - `redemption_count`, `max_redemptions`, `created_at`, `updated_at`

            Unknown field names will return a `400` error.
          example: code,balance,expiry_date
      responses:
        '200':
          description: Success
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
