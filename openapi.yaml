    get:
      operationId: checkGiftCard
      tags:
        - Gift Cards
      summary: Check gift card balance
      description: |
        Look up a gift card by code and check its validity, balance, expiry and
        maximum-usage rules. Accessible with both publishable (`tybrite_pk_*`) and
        secret (`tybrite_sk_*`) API keys.

        The `valid` flag is `true` only when the gift card is active, has a
        positive balance, and has not expired.

        Responses are cached at the edge for ~30s and support ETag revalidation
        via `If-None-Match`.
      security:
        - BearerAuth: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: The unique gift card code to look up (e.g. `GTSA-1B2C-3D4E-5F6G`).
        - name: fields
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of fields to include in the embedded `gift_card` object.

            **Allowed Fields:**
            - `id`, `code`, `value`, `balance`, `status`, `type`
            - `expiry_date`, `customer_id`, `issued_to`, `issued_date`, `last_used`
            - `minimum_purchase_amount`, `maximum_usage_percentage`, `usage_restrictions`
            - `redemption_count`, `max_redemptions`, `created_at`, `updated_at`

            Unknown field names will return a `400` error.
          example: code,balance,expiry_date
      responses:
        '200':
          description: Success
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: True when the gift card is active, has balance > 0, and is not expired.
                  balance:
                    type: number
                  status:
                    type: string
                    description: Lifecycle status. A gift card is only redeemable while `active`.
                  expiry_date:
                    type:
                      - string
                      - 'null'
                    format: date
                  maximum_usage_percentage:
                    type:
                      - number
                      - 'null'
                  gift_card:
                    $ref: '#/components/schemas/GiftCard'
              example:
                valid: true
                balance: 100
                status: active
                expiry_date: '2026-03-31'
                maximum_usage_percentage: null
                gift_card:
                  id: c91a7918-4a88-440e-8509-993e7ff2cbac
                  code: GTSA-1B2C-3D4E-5F6G
                  value: 100
                  balance: 100
                  status: active
