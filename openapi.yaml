    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type:
            - string
            - 'null'
          description: The customer's address, or null if not on file.
        status:
          type: string
          enum:
            - active
            - inactive
        tier:
          type: string
          description: |
            The customer's loyalty/spend tier, derived from their purchase history. New
            customers start at `bronze`.
          enum:
            - bronze
            - silver
            - gold
            - platinum
          example: bronze
        join_date:
          type: string
          format: date
        external_id:
          type:
            - string
            - 'null'
          description: |
            Optional identifier from an external identity provider (Auth0, Clerk, Cognito,
            Firebase, NextAuth, etc). Unique per store + environment. Set this when you
            manage authentication outside Galactic Core and need a stable handle to map
            your upstream user back to the Galactic Core customer record.
          example: auth0|66a3f8c2b1d9c204a1f7e3d1
        marketing_consent:
          type: boolean
          description: |
            Whether the customer has opted in to marketing communications. Defaults to false
            (opt-in). Set this from your storefront's marketing opt-in checkbox at sign-up,
            checkout, or in the customer's account preferences. When true, the customer is
            eligible to be subscribed to the store's connected marketing tools.
          default: false
          example: true
        total_purchases:
          type: integer
        last_purchase:
          type:
            - string
            - 'null'
          format: date-time
          description: Timestamp of the customer's most recent purchase, or null if they have not purchased yet.
        store_credit_balance:
          type: number
          description: |
            The customer's total redeemable store-credit balance. Store credit is
            issued when a customer accepts a store-credit offer on a return, and can
            be applied at checkout (see `apply_store_credit` on `POST /v1/orders`).
          example: 25
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        store_metrics:
          type:
            - object
            - 'null'
          description: Aggregated purchase metrics for the customer, or null until they have purchase history.
          properties:
            total_purchases:
              type: integer
            total_spent:
              type: number
            first_purchase_date:
              type: string
            last_purchase_date:
              type: string
            status:
              type: string
            preferred_store:
              type: string
        environment:
          type: string
          enum:
            - production
            - sandbox
          description: Whether this customer record belongs to the live or test environment.
          example: production
    Session:
