  /v1/webhook_endpoints:
    post:
      operationId: createWebhookEndpoint
      tags:
        - Webhooks
      summary: Create a webhook endpoint
      description: |
        Register a new HTTPS endpoint to receive outbound event notifications.
        The `signing_secret` is returned **once** at creation — store it
        immediately. It cannot be retrieved again; rotate it via a DELETE +
        re-create if lost.

        Failed deliveries are retried automatically with exponential backoff. If an
        endpoint fails 20 deliveries in a row (each after exhausting its retries),
        it is automatically disabled (`enabled: false`) and stamped with a
        `disabled_reason`. Re-enable it with a `PATCH` once the endpoint is healthy
        again; re-enabling resets the failure counter.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - events
              properties:
                url:
                  type: string
                  format: uri
                  description: HTTPS destination URL. HTTP is rejected.
                  example: https://yourapp.com/webhooks/tybrite
                events:
                  type: array
                  items:
                    type: string
                  description: |
                    Array of event types to subscribe to. Use `["*"]` for all events.

                    **Order lifecycle:** `order.created`, `order.paid`, `order.fulfilled`,
                    `order.cancelled`, `order.refunded`, `order.updated`

                    **Payment lifecycle:** `payment.succeeded`, `payment.failed`, `payment.refunded`

                    **Customer lifecycle:** `customer.created`, `customer.updated`, `customer.deleted`

                    **Inventory & catalog:** `product.created`, `product.updated`,
                    `product.stock_low`, `product.out_of_stock`

                    **Cart & checkout:** `cart.created`, `cart.updated`, `cart.abandoned`

                    **Gift cards:** `gift_card.issued`, `gift_card.redeemed`, `gift_card.expired`

                    **Promotions:** `promotion.applied`

                    **Catalog sync & syndication:** `feed.sync.completed` (a scheduled
                    inbound feed-pull finished — carries created/updated/failed counts),
                    `channel.sync.completed` (a sales-channel push to Google/Meta/… finished —
                    carries pushed/rejected counts)
                  example:
                    - order.paid
                    - order.fulfilled
                    - payment.succeeded
                enabled:
                  type: boolean
                  default: true
                  description: Whether the endpoint is active. Disabled endpoints are skipped on delivery.
                metadata:
                  type: object
                  description: Opaque key-value pairs for your own reference (not sent in deliveries).
                  example:
                    label: production-erp
                    owner: platform-team
      responses:
        '201':
          description: Endpoint created
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook_endpoint:
                    $ref: '#/components/schemas/WebhookEndpointWithSecret'
              example:
                webhook_endpoint:
                  id: ac6737d6-12b9-446d-a6c4-1077493f498f
                  url: https://yourapp.com/webhooks/tybrite
                  events:
                    - order.paid
                    - order.fulfilled
                  enabled: true
                  metadata:
                    label: production-erp
                  created_at: '2026-06-20T13:39:11.631+00:00'
                  updated_at: '2026-06-20T13:39:11.631+00:00'
                  signing_secret: 68c216748eb34be5adf93e39cda61386337883e7420c4a6d1994eb11346bce20
        '400':
