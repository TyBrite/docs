tags:
  - name: System
    description: API information and health checks
  - name: Authentication
    description: |
      Customer authentication and session management.
      
      **⚠️ SECRET KEY REQUIRED**: All authentication endpoints require a secret key (tybrite_sk_*).
      Publishable keys will return 403 Forbidden.
      
      These endpoints manage customer accounts, login sessions, password resets, and OTP verification.
      Use these to build customer-facing authentication flows in your storefront.
      
      **Special Headers:**
      - `x-auth-token`: Required for `GET /v1/auth/me` and `POST /v1/auth/update-password`
      - Contains the authentication token from login/register response
      - Token expires after session timeout (default 1 hour)
      
      **Rate Limiting:**
      - All authentication endpoints: 10 requests/minute per IP address
      - Prevents brute force attacks on customer accounts
  - name: Products
    description: Product catalog management
  - name: Orders
    description: |
      Order lifecycle management with automatic inventory sync and accounting.
      
      **Special Headers:**
      - `Idempotency-Key`: **REQUIRED** for `POST /v1/orders` and `PATCH /v1/orders/:id`
        - Prevents duplicate order creation and duplicate update processing on network retries
        - Recommended formats:
          - Order creation: `order-{date}-{unique-id}`
          - Order updates: `update-{operation}-{order_id}-{timestamp}`
        - Stored for 24 hours
        - Retrying with same key returns existing order/state (not counted against rate limit)
      - `X-Timestamp`: **REQUIRED** for `POST /v1/orders` and `PATCH /v1/orders/:id`
        - Unix timestamp in seconds (current time)
        - Must be within 5 minutes of server time
        - Used to prevent replay attacks
      - `X-Signature`: **REQUIRED** for `POST /v1/orders` and `PATCH /v1/orders/:id`
        - HMAC-SHA256 signature of payload (timestamp + "." + request_body), base64-encoded
        - Sign using your HMAC secret from Settings → Integration Settings
        - Requests with invalid/missing signatures return 401 Unauthorized
      
      **Automatic Processing:**
      - Inventory automatically decremented when payment_status changes to 'paid'
      - Double-entry accounting journal entries created automatically
      - Payment status tracked and updated via webhooks
      - Gift card redemptions and promotion usage tracked with idempotency protection
  - name: Customers
    description: Customer profile management
  - name: Cart & Wishlist
    description: |
      Shopping cart and wishlist operations with anonymous session support.
      
      **Special Headers:**
      - `X-Session-Id`: Optional header for anonymous cart functionality
      - Generate a unique session ID on the client (UUID or random string)
      - Store in localStorage/sessionStorage for persistence
      - When customer logs in, migrate cart by providing `customer_id` instead
      
      **Cart Association:**
      - If `X-Session-Id` provided: Cart associated with session (anonymous)
      - If `customer_id` provided: Cart associated with customer account
      - If both provided: `customer_id` takes precedence
      - If neither provided: Returns 400 error
      
      **Use Cases:**
      - Anonymous browsing: Use `X-Session-Id` before customer authentication
      - Logged-in customers: Use `customer_id` parameter
      - Cart migration: Switch from session to customer_id after login
  - name: Search
    description: |
      Semantic search with AI embeddings and simple text search.
      
      **Key Type Support:**
      - `GET /v1/search` (simple text search): Both secret and publishable keys allowed
      - `POST /v1/search` (semantic search): Both secret and publishable keys allowed
      
      Note: Despite using POST method, semantic search is a read-only operation and works
      with publishable keys. The POST method is used to support complex request bodies.
  - name: Recommendations
    description: |
      AI-powered product recommendations using semantic embeddings and collaborative filtering.
      
      **⚠️ SECRET KEY REQUIRED**: Recommendation generation requires a secret key (tybrite_sk_*).
      Publishable keys will return 403 Forbidden.
      
      This restriction protects the computational resources and AI model access used for
      generating personalized recommendations.
  - name: Taxonomy
    description: Categories and subcategories
  - name: CMS
    description: Content management (posts, lookbooks)
  - name: Payments
    description: |
      Multi-provider payment processing (Stripe, Paystack, M-Pesa, Airtel Money).
      
      **Special Headers:**
      - `Idempotency-Key`: **REQUIRED** for `POST /v1/payments/initialize`
        - Unique key to prevent duplicate payment initialization (e.g., payment-{timestamp}-{random})
        - If you retry with the same key, the original payment initialization is returned
        - Prevents duplicate charges on network retries
      - `X-Timestamp`: **REQUIRED** for `POST /v1/payments/initialize`
        - Unix timestamp in seconds (current time)
        - Must be within 5 minutes of server time
        - Used to prevent replay attacks
      - `X-Signature`: **REQUIRED** for `POST /v1/payments/initialize`
        - HMAC-SHA256 signature of payload (timestamp + "." + request_body), base64-encoded
        - Sign using your HMAC secret from Settings → Integration Settings
        - Requests with invalid/missing signatures return 401 Unauthorized
      
      **Key Type Requirements:**
      - `GET /v1/payments/methods`: Both secret and publishable keys allowed
      - `POST /v1/payments/initialize`: Secret key required
      - `POST /v1/payments/verify`: **SECRET KEY REQUIRED** (read operation but sensitive)
      
      Payment verification requires a secret key because it accesses sensitive payment status
      information that should not be exposed to client-side code.
      
      **Rate Limiting:**
      - Payment initialization has an additional rate limit of 100 requests/hour per API key
      - This is on top of the global rate limits (1,000/hour for publishable keys, 10,000/hour for secret keys)
      - Prevents payment spam and fraud attempts
  - name: Shipping
    description: Shipping zones and delivery cost calculation
  - name: Pricing
    description: Dynamic pricing engine
  - name: Promotions
    description: Marketing promotions and discounts
  - name: Gift Cards
    description: Gift card management
  - name: Messaging
    description: Real-time customer support messaging
security:
  - BearerAuth: []
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        **API Key Authentication**
        
        Use your API key in the Authorization header:
        ```
        Authorization: Bearer tybrite_sk_live_YOUR_KEY
        ```
        
        **Key Types:**
        
        **Secret Keys (Server-Side Only):**
        - Format: `tybrite_sk_live_*` (production) or `tybrite_sk_test_*` (sandbox)
        - Full read/write access to all endpoints
        - ⚠️ NEVER expose in client-side code or public repositories
        - Required for: write operations, authentication, payment verification, AI recommendations
        
        **Publishable Keys (Client-Safe):**
        - Format: `tybrite_pk_live_*` (production) or `tybrite_pk_test_*` (sandbox)
        - Read-only access (GET requests only, plus POST semantic search)
        - ✅ Safe for client-side JavaScript, mobile apps, and public code
        - Allowed for: browsing products, search, CMS content, pricing queries
        
        **Endpoint-Specific Requirements:**
        - **Authentication endpoints** (`/v1/auth/*`): Secret key required
        - **Payment verification** (`POST /v1/payments/verify`): Secret key required
        - **AI Recommendations** (`POST /v1/recommendations`): Secret key required
        - **Semantic Search** (`POST /v1/search`): Both key types allowed (read-only operation)
        - **All write operations**: Secret key required
        - **All read operations**: Both key types allowed
        
        Using a publishable key for restricted operations returns 403 Forbidden.
  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: invalid_request
            message:
              type: string
              example: Missing required field
            details:
              type: string
              example: The 'email' field is required
    StoreInfoResponse:
      type: object
      required:
        - store
      properties:
        store:
          type: object
          description: Basic store information (always included)
          required:
            - store_id
            - name
            - default_currency
            - currencies
            - timezone
            - created_at
          properties:
            store_id:
              type: string
              format: uuid
              description: Unique store identifier
            name:
              type: string
              description: Store display name
            default_currency:
              type: string
              description: Store's default currency code (ISO 4217)
            currencies:
              type: array
              description: List of active currency codes supported by the store
              items:
                type: string
            timezone:
              type: string
              description: Store timezone (IANA timezone identifier)
            created_at:
              type: string
              format: date-time
              description: Store creation timestamp
        catalog:
          type: object
          description: Catalog overview (optional, included when requested)
          properties:
            products:
              type: object
              properties:
                total:
                  type: integer
                has_variants:
                  type: integer
                simple_products:
                  type: integer
                active:
                  type: integer
                inactive:
                  type: integer
                featured:
                  type: integer
                with_images:
                  type: integer
                low_stock:
                  type: integer
            collections:
              type: object
              properties:
                total:
                  type: integer
                names:
                  type: array
                  items:
                    type: string
            taxonomy:
              type: object
              properties:
                categories:
                  type: object
                  properties:
                    total:
                      type: integer
                    list:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          name:
                            type: string
                          product_count:
                            type: integer
                subcategories:
                  type: object
                  properties:
                    total:
                      type: integer
                    list:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          name:
                            type: string
                          category:
                            type: string
                          product_count:
                            type: integer
            specifications:
              type: object
              properties:
                total:
                  type: integer
                types:
                  type: array
                  items:
                    type: string
            brands:
              type: object
              properties:
                total:
                  type: integer
                list:
                  type: array
                  items:
                    type: string
        pricing:
          type: object
          description: Pricing configuration (optional, included when requested)
          properties:
            has_dynamic_pricing:
              type: boolean
            features:
              type: object
              properties:
                customer_tiers:
                  type: boolean
                customer_segments:
                  type: boolean
                volume_discounts:
                  type: boolean
                location_based:
                  type: boolean
                time_based:
                  type: boolean
            customer_tiers:
              type: array
              items:
                type: string
            pricing_rules:
              type: object
              properties:
                total:
                  type: integer
                active:
                  type: integer
        promotions:
          type: object
          description: Promotions overview (optional, included when requested)
          properties:
            total:
              type: integer
            active:
              type: integer
            types:
              type: object
              properties:
                percentage_discount:
                  type: integer
                fixed_discount:
                  type: integer
                bogo:
                  type: integer
                bundle:
                  type: integer
                free_shipping:
                  type: integer
        payments:
          type: object
          description: Payment configuration (optional, included when requested)
          properties:
            providers:
              type: array
              items:
                type: string
            methods:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  display_name:
                    type: string
                  type:
                    type: string
                    enum: [manual, redirect, popup, stk_push]
        shipping:
          type: object
          description: Shipping configuration (optional, included when requested)
          properties:
            zones:
              type: object
              properties:
                total:
                  type: integer
                list:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      delivery_fee:
                        type: number
                      free_threshold:
                        type: number
                        nullable: true
            has_free_shipping_threshold:
              type: boolean
        cms:
          type: object
          description: CMS content overview (optional, included when requested)
          properties:
            posts:
              type: object
              properties:
                total:
                  type: integer
                published:
                  type: integer
                draft:
                  type: integer
            lookbooks:
              type: object
              properties:
                total:
                  type: integer
                published:
                  type: integer
        features:
          type: object
          description: Feature flags (optional, included when requested)
          properties:
            ai_recommendations:
              type: boolean
            semantic_search:
              type: boolean
            multi_currency:
              type: boolean
            dynamic_pricing:
              type: boolean
            gift_cards:
              type: boolean
            promotions:
              type: boolean
            cms:
              type: boolean
            messaging:
              type: boolean
            specifications:
              type: boolean
            collections:
              type: boolean
    Product:
      type: object
      description: |
        Represents a product in the catalog. Response structure varies based on endpoint and variant configuration:
        
        **List Endpoint (GET /v1/products):**
        - Returns flat structure with default variant data only
        - No variants array (keeps payload small for browsing)
        - Includes has_variants flag to indicate if detail fetch needed
        
        **Detail Endpoints (GET /v1/products/:id, GET /v1/products/by-slug/:slug):**
        - Multi-variant products: Hierarchical structure with product-level data at root + variants array
        - Simple products: Flat structure with all data at root (no variants array)
        
        **Field Filtering:**
        - Root-level filtering: Reduce top-level fields 
        - Nested filtering: Filter specific variant fields using dot notation 
        - Example: fields=name,price_range,variants.sku,variants.selling_price,variants.stock
      properties:
        # ========== PRODUCT-LEVEL FIELDS (shared across variants) ==========
        product_id:
          type: string
          format: uuid
          description: Main product identifier
          example: d8cea277-9bb6-4942-b9e9-2f2ac351509f
        name:
          type: string
          description: Product name (mapped from online_name or name)
          example: Sony WH-1000XM4
        description:
          type: string
          description: Product description (mapped from online_description or description)
          example: Wireless noise-cancelling headphones
        category_id:
          type: string
          format: uuid
          nullable: true
          description: Category UUID
        category_name:
          type: string
          nullable: true
          description: Category display name
          example: Electronics
        subcategory_id:
          type: string
          format: uuid
          nullable: true
          description: Subcategory UUID
        subcategory_name:
          type: string
          nullable: true
          description: Subcategory display name
          example: Headphones
        brand:
          type: string
          nullable: true
          description: Product brand
          example: Sony
        images:
          type: array
          items:
            type: string
            format: uri
          description: Array of product image URLs (mapped from online_images or image)
          example: ["https://images.unsplash.com/photo-1234567890"]
        product_slug:
          type: string
          nullable: true
          description: SEO-friendly URL slug
          example: sony-wh-1000xm4-abc123
        seo_title:
          type: string
          nullable: true
          description: SEO optimized title
        seo_description:
          type: string
          nullable: true
          description: SEO optimized description
        seo_keywords:
          type: string
          nullable: true
          description: SEO keywords
        featured:
          type: boolean
          nullable: true
          description: Whether product is featured
        featured_order:
          type: integer
          nullable: true
          description: Display order for featured products
        online_category:
          type: string
          nullable: true
          description: Merged category/subcategory string
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Product tags
        attributes:
          type: object
          additionalProperties: true
          nullable: true
          description: Product-level attributes (not variant-specific)
        shipping_info:
          type: object
          nullable: true
          description: Shipping dimensions and weight
          properties:
            weight:
              type: number
            dimensions:
              type: object
              properties:
                length: { type: number }
                width: { type: number }
                height: { type: number }
        created_at:
          type: string
          format: date-time
          nullable: true
          description: Product creation timestamp
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Last update timestamp
        is_active:
          type: boolean
          nullable: true
          description: Whether product is active
        
        # ========== VARIANT-LEVEL FIELDS (for simple products or list endpoint) ==========
        variant_id:
          type: string
          format: uuid
          nullable: true
          description: Variant identifier (only present for simple products or list endpoint)
          example: cc35d16b-fca5-4faa-8699-d3d5d3521bca
        sku:
          type: string
          nullable: true
          description: Stock Keeping Unit (only present for simple products or list endpoint)
          example: SNY-WH1000
        price:
          type: number
          nullable: true
          description: Base price in cents (only present for simple products or list endpoint)
          example: 36999
        sale_price:
          type: number
          nullable: true
          description: Sale price in cents if on sale
        selling_price:
          type: number
          nullable: true
          description: Actual customer-facing price (considers sale_price)
          example: 34999
        stock:
          type: integer
          nullable: true
          description: Available stock quantity (only present for simple products or list endpoint)
          example: 40
        threshold:
          type: integer
          nullable: true
          description: Low stock threshold
        last_restocked:
          type: string
          format: date
          nullable: true
          description: Last restock date
        variant_attributes:
          type: object
          additionalProperties: true
          nullable: true
          description: Variant-specific attributes (e.g., color, size)
          example: { "color": "Black" }
        variant_name:
          type: string
          nullable: true
          description: Variant display name
        is_default:
          type: boolean
          nullable: true
          description: Whether this is the default variant
        
        # ========== AGGREGATE DATA (for multi-variant products) ==========
        total_stock:
          type: integer
          nullable: true
          description: Sum of stock across all variants (only present for multi-variant products)
          example: 85
        price_range:
          type: object
          nullable: true
          description: Price range across variants using selling_price (only present for multi-variant products)
          properties:
            min:
              type: number
              description: Minimum selling price in cents
              example: 34999
            max:
              type: number
              description: Maximum selling price in cents
              example: 38999
        
        # ========== FLAGS ==========
        has_variants:
          type: boolean
          description: Whether product has multiple variants
          example: true
        variant_count:
          type: integer
          nullable: true
          description: Number of variants (only present for multi-variant products)
          example: 3
        
        # ========== CURRENCY ==========
        display_currency:
          type: string
          description: Store's default currency code
          example: EUR
        currency_symbol:
          type: string
          description: Currency symbol
          example: €
        
        # ========== VARIANTS ARRAY (for multi-variant products) ==========
        variants:
          type: array
          nullable: true
          description: Array of product variants (only present for multi-variant products in detail endpoints)
          items:
            $ref: "#/components/schemas/ProductVariant"
    
    ProductVariant:
      type: object
      description: |
        Represents a single product variant with only variant-specific fields.
        Product-level attributes (name, description, brand, etc.) are NOT duplicated here.
        
        **Field Filtering:**
        Use dot notation to filter variant fields: variants.sku,variants.selling_price,variants.stock
        This can reduce payload size by up to 52% by excluding internal fields like threshold, last_restocked.
      properties:
        variant_id:
          type: string
          format: uuid
          description: Unique variant identifier
          example: 83b6a47e-4f5c-4090-b8d3-4b606b78f1b4
        sku:
          type: string
          description: Stock Keeping Unit for this variant
          example: SNY-WH1002
        price:
          type: number
          description: Base price in cents
          example: 36999
        sale_price:
          type: number
          nullable: true
          description: Sale price in cents (null if not on sale)
        selling_price:
          type: number
          description: Actual customer-facing price in cents (considers sale_price)
          example: 34999
        stock:
          type: integer
          description: Available stock quantity for this variant
          example: 10
        threshold:
          type: integer
          nullable: true
          description: Low stock threshold (internal inventory field)
          example: 5
        last_restocked:
          type: string
          format: date
          nullable: true
          description: Last restock date (internal inventory field)
          example: "2026-02-17"
        variant_attributes:
          type: object
          additionalProperties: true
          nullable: true
          description: Variant-specific attributes (e.g., color, size, material)
          example: { "color": "Black" }
        variant_name:
          type: string
          nullable: true
          description: Display name for this variant
          example: Variant 3
        is_default:
          type: boolean
          description: Whether this is the default variant
          example: false
