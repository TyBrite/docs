    MerchantBreakdownItem:
      type: object
      description: Commission and payout breakdown for a single merchant within a unified order.
      properties:
        merchant_store_id:
          type: string
          format: uuid
        merchant_gross:
          type: number
          description: Total of this merchant's items before any discount is applied.
          example: 130
        discount_amount:
          type: number
          description: Total discount applied to this merchant's portion of the basket (the merchant's own promotion and/or gift card). Reduces this merchant's subtotal.
          example: 10
        gross_amount:
          type: number
          description: Total of this merchant's items after discount and before commission.
          example: 120
        commission_amount:
          type: number
          description: Commission deducted from this merchant's gross.
          example: 12
        net_amount:
          type: number
          description: Amount this merchant receives after commission.
          example: 108
        commission_rule_id:
          type:
            - string
            - 'null'
          format: uuid
          description: Identifier of the commission rule applied to this merchant, or null if none matched.
    MarketplaceCheckoutResponse:
      type: object
      description: |
        A created multi-merchant order awaiting payment. Use `client_secret` to
        complete the payment on the storefront; the order finalizes automatically
        once payment succeeds.
      properties:
        order_group_id:
          type: string
          format: uuid
          description: Identifier for the multi-merchant order.
        group_number:
          type: string
          description: Human-readable reference for the order.
          example: MKT-100042
        payment_intent_id:
          type: string
          description: Identifier of the payment to complete on the storefront.
        client_secret:
          type: string
          description: Secret used by the storefront payment form to complete the charge.
        currency:
          type: string
          example: USD
        subtotal:
          type: number
          example: 245
        total_amount:
          type: number
          example: 245
        discount_total:
          type: number
          description: Total discount applied across the whole basket — the sum of every merchant's own promotion and gift card discounts plus any marketplace-wide promotion run by the operator.
          example: 10
        operator_funded_discount:
          type: number
          description: The portion of `discount_total` funded by the marketplace operator (for example a marketplace-wide promotion). The remainder is funded by individual merchants.
          example: 5
        discount_breakdown:
          type: array
          description: Per-merchant breakdown of how discounts were applied.
          items:
            type: object
            properties:
              merchant_store_id:
                type: string
                format: uuid
              merchant_discount:
                type: number
                description: Discount funded by this merchant's own promotion.
                example: 5
              gift_card_amount:
                type: number
                description: Amount redeemed from a gift card against this merchant's portion.
                example: 0
              operator_funded_discount:
                type: number
                description: Discount applied to this merchant's portion that the marketplace operator funded (for example a marketplace-wide promotion).
                example: 5
        merchant_breakdown:
          type: array
          description: Per-merchant gross, discount, commission, and net amounts for this order.
          items:
            $ref: '#/components/schemas/MerchantBreakdownItem'
