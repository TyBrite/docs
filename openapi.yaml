    post:
      operationId: sendMessage
      tags:
        - Messaging
      summary: Send a message to a thread
      description: |
        Append a new message to an existing conversation thread on behalf of the
        signed-in shopper. The store sees it in their admin inbox and can reply;
        the reply streams back to the shopper over the realtime channel
        (see `getMessagingRealtimeToken`).

        **Auth:** API key in `Authorization: Bearer` (a **publishable** key is fine —
        this is a browser-origin storefront write) **plus** the shopper's customer
        session token in `x-auth-token`. The token must own the thread, otherwise
        the request returns `403`.

        **Body field:** the message text goes in `message`. (Note the sibling
        `editMessage` endpoint uses `message_content` instead.)

        **SDK**
      security:
        - BearerAuth: []
      parameters:
        - name: x-auth-token
          in: header
          required: true
          description: Customer session access_token. Required to prove ownership of the thread/message being accessed.
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
      responses:
        '201':
          description: Message sent
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      created_at:
                        type: string
                        format: date-time
              example:
                message:
                  id: 321ca5bd-26c8-488e-b487-5927d4d81cf3
                  created_at: '2026-06-20T13:48:16.313869+00:00'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/ServerError'
  /v1/messaging/conversations:
    post:
      operationId: createConversation
      tags:
        - Messaging
      summary: Start a new conversation
      description: |
        Open a new message thread with the store and post the shopper's first
        message in one call. Returns the created thread (with its `id`), which you
        then use to send follow-ups (`sendMessage`) and read replies.

        **Auth:** API key in `Authorization: Bearer` (a **publishable** key is fine —
        this is a browser-origin storefront write) **plus** the shopper's customer
        session token in `x-auth-token` when you pass `customer_id` (the token must
        own that customer, otherwise `403`).

        **`thread_type`** classifies the inquiry: `general`, `order_inquiry`,
        `product_inquiry`, `support`, `complaint`, `delivery`, `return`, `refund`,
        or `technical`.

        **SDK**
      security:
        - BearerAuth: []
      parameters:
        - name: x-auth-token
          in: header
          required: false
          description: Customer session access_token. Required when body.customer_id is supplied so the gateway can prove the caller owns that customer record.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customer_name
                - customer_email
                - subject
                - message
              properties:
                customer_id:
                  type: string
                  format: uuid
                  description: Optional — links thread to an existing customer record
                customer_name:
                  type: string
                  example: Jane Doe
                customer_email:
                  type: string
                  format: email
                  example: jane.doe@example.com
                customer_phone:
                  type: string
                  example: '+12125550175'
                subject:
                  type: string
                  example: Question about my order
                message:
                  type: string
                  example: Hi, I placed an order yesterday — when will it ship?
                order_id:
                  type: string
                  format: uuid
                product_id:
                  type: string
                  format: uuid
                priority:
                  type: string
                  enum:
                    - urgent
                    - high
                    - normal
                    - low
                  default: normal
                thread_type:
                  type: string
                  enum:
                    - general
                    - order_inquiry
                    - product_inquiry
                    - support
                    - complaint
                    - delivery
                    - return
                    - refund
                    - technical
      responses:
        '201':
          description: Conversation created
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      subject:
                        type: string
                      status:
                        type: string
                      priority:
                        type: string
                  message:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      created_at:
                        type: string
                        format: date-time
              example:
                thread:
                  id: de30ebb3-d8d0-4b55-9ca6-e2f2d9ac2383
                  subject: Question about my order
                  status: active
                  priority: normal
                message:
                  id: 7737377c-5f60-4cba-981a-93253053642a
                  created_at: '2026-06-20T13:48:15.256048+00:00'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/ServerError'
