            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: Customer email address
                  example: jane.doe@example.com
                password:
                  type: string
                  description: Customer password
                  example: SecurePassword123!
            example:
              email: jane.doe@example.com
              password: SecurePassword123!
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
