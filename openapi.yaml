                - line1
                - city
                - country
              properties:
                full_name:
                  type: string
                  example: John Doe
                line1:
                  type: string
                  example: 123 Main St
                city:
                  type: string
                  example: New York
                country:
                  type: string
                  example: US
                address_type:
                  type: string
                  enum:
                    - shipping
                    - billing
                    - both
                  default: both
                  description: Whether this address is usable for shipping, billing, or both.
                label:
                  type: string
                  description: An optional friendly name, e.g. "Home" or "Office".
                  example: Home
                phone:
