  /v1/promotions/{id}:
    get:
      operationId: getPromotion
      tags:
        - Promotions
      summary: Get promotion details
      description: |
        Get a single promotion's details, including the products it applies to.

        The `type` field tells you how the promotion works and which product fields
        to read:
        - `discount` (percentage) / `fixed` — a cart-level discount. There are no
          promotion products; render `value` and any `min_purchase`.
        - `bundle` — read `bundle_products`: a list of `{ productId, quantity, discountedPrice }`.
        - `bogo` — read `bogo_required_products` (buy these) and `bogo_free_products`
          (get these free): lists of `{ productId, quantity }`.

        These fields contain product **ids** — fetch each product's full detail with
        the Products API to render it. Alternatively, pass `expand=products` to get the
        promotion's bundle/BOGO products resolved with their details in one call, so you
        don't need a second lookup (see the `expand` parameter below).

        **Marketplace storefronts:** when a sponsored ad placement or a curated
        collection gives you a `promotion_id`, fetch its detail here by passing
        `store_id` (the `merchant_store_id` you received alongside the promotion).
        A marketplace key may read a single promotion this way; it cannot list
        promotions.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: store_id
          in: query
          description: |
            The merchant whose promotion to read. Required for marketplace
            storefronts — pass the `merchant_store_id` you received with the
            promotion. Ignored for single-store keys.
          schema:
            type: string
            format: uuid
        - name: expand
          in: query
          description: |
            Pass `expand=products` to get the promotion's bundle/BOGO products resolved
            with their details, so you don't need a second lookup. The response then
            additionally includes `bundle_products_resolved`,
            `bogo_required_products_resolved`, and `bogo_free_products_resolved` — the
            same entries as the corresponding id arrays, but each with an embedded
            `product` object (`product_id`, `name`, `price`, `image`, `category`), or
            `null` for any product that is unavailable.
          schema:
            type: string
            enum:
              - products
        - name: fields
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of fields to include in the response.

            **Allowed Fields:**
            - `id`, `name`, `type`, `display_type`, `value`, `min_purchase`
            - `start_date`, `end_date`, `status`, `conditions`, `image`
            - `bundle_products`, `bogo_required_products`, `bogo_free_products`, `free_products`
            - `has_time_restrictions`, `start_time`, `end_time`, `time_zone`, `apply_to_days`
            - `created_at`, `updated_at`
          example: name,type,value
      responses:
        '200':
          description: Success
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Promotion'
              example:
                type: discount
                display_type: Percentage Discount
                name: Spring Sale — 15% Off
                value: '15'
                min_purchase: 50
                start_date: '2026-06-19'
                end_date: '2026-07-20'
                status: active
                conditions: Minimum spend $50
                created_at: '2026-06-20T11:12:09.860326+00:00'
                updated_at: '2026-06-20T13:44:36.764884+00:00'
                has_time_restrictions: false
                start_time: null
                end_time: null
                time_zone: America/New_York
                apply_to_days: null
                id: df290d89-0400-4b2c-aa56-11fcc486150c
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/ServerError'
  /v1/promotions/{id}/calculate:
    post:
      operationId: calculatePromotionDiscount
      tags:
        - Promotions
      summary: Calculate a promotion's discount for a cart
      description: |
        Compute the discount a single promotion gives for a cart, server-side. The
        result always matches the merchant's own calculation, so your storefront never
        reimplements the discount math (no `subtotal × percentage` on your side).

        Send the cart you intend to charge — each line is the product, its quantity, and
        the **unit price** you're charging. How the discount is computed depends on the
        promotion's `type`:
        - `discount` (percentage) and `fixed` — a cart-wide discount applied to the
          eligible cart total.
        - `bundle` and `bogo` — computed from the products present in the cart.

        When the cart doesn't qualify (the minimum purchase isn't met, the promotion is
        outside its active date/time window, or required products are absent), the
        response is `eligible: false` with `discount: 0` and a `reason` explaining why.

        **Marketplace storefronts:** pass `store_id` (the `merchant_store_id` you
        received with the promotion) to calculate against that merchant's promotion.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: store_id
          in: query
          description: |
            The merchant whose promotion to calculate against. Required for marketplace
            storefronts — pass the `merchant_store_id` you received with the promotion.
            Ignored for single-store keys.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cart
              properties:
                cart:
                  type: array
                  description: The cart lines to calculate the discount against.
                  items:
                    $ref: '#/components/schemas/PromotionCartItem'
            example:
              cart:
                - product_id: 7d425c0a-50e7-4e39-af79-6f7945f9dfa8
                  quantity: 1
                  price: 349.99
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionCalculation'
              examples:
                eligible:
                  summary: Qualifying cart (15% off)
                  value:
                    promotion_id: df290d89-0400-4b2c-aa56-11fcc486150c
                    type: discount
                    eligible: true
                    discount: 52.5
                    reason: null
                not_eligible:
                  summary: Cart under the minimum purchase
                  value:
                    promotion_id: df290d89-0400-4b2c-aa56-11fcc486150c
                    type: discount
                    eligible: false
                    discount: 0
                    reason: Minimum purchase not met
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/ServerError'
  /v1/promotions/calculate-best:
    post:
      operationId: calculateBestPromotion
      tags:
        - Promotions
      summary: Find the best promotion for a cart
      description: |
        Return the single highest-value eligible promotion for a cart — what to
        auto-apply at checkout. Galactic Core evaluates every active promotion against
        the cart server-side and returns the one that saves the customer the most, along
        with its discount amount.

        Send the cart you intend to charge — each line is the product, its quantity, and
        the **unit price** you're charging. When no promotion applies, `promotion` is
        `null` and `discount` is `0`.

        **Marketplace storefronts:** pass `store_id` (the `merchant_store_id` you
        received with the promotion or collection) to evaluate that merchant's
        promotions.
      security:
        - BearerAuth: []
      parameters:
        - name: store_id
          in: query
          description: |
            The merchant whose promotions to evaluate. Required for marketplace
            storefronts — pass the `merchant_store_id` you received with the promotion
            or collection. Ignored for single-store keys.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cart
              properties:
                cart:
                  type: array
                  description: The cart lines to evaluate promotions against.
                  items:
                    $ref: '#/components/schemas/PromotionCartItem'
            example:
              cart:
                - product_id: 7d425c0a-50e7-4e39-af79-6f7945f9dfa8
                  quantity: 1
                  price: 349.99
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BestPromotion'
              example:
                promotion:
                  id: 46e746e2-6ef3-4091-ae4e-6bc8d405a1a2
                  name: Audio + Wearable Bundle
                  type: bundle
                discount: 100
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/ServerError'
  /v1/posts:
    get:
      operationId: listPosts
      tags:
        - CMS
      summary: List blog posts
      description: |
        List the store's published blog posts, newest first, with cursor-based pagination. Posts may
        be commerce-aware (shoppable) and link to products in the catalog (`product_count` on each
        item).

        **Auth:** read-only; accepts both publishable (`tybrite_pk_*`) and secret (`tybrite_sk_*`) API
        keys, so it can be called directly from the storefront. No customer session required.

        **When to use:** render a blog index or editorial feed. Filter by category with `?category=`
        (a category **slug**), cap page size with `limit` (default 20, max 100), and page through with
        the `cursor` returned in `pagination.next_cursor` while `pagination.has_more` is `true`. Use
        `getPost` to fetch a single post's full `content`.
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: query
          description: Filter posts by category slug
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          description: Cursor for pagination (base64-encoded)
          schema:
            type: string
        - name: fields
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of fields to include in the response.

            **Allowed Fields:**
            - `id`, `title`, `slug`, `excerpt`, `content`, `featured_image`
            - `category_id`, `category_name`, `category_slug`, `category_icon`
            - `author_name`, `author_avatar`, `status`, `published_at`
            - `view_count`, `product_count`, `seo_title`, `seo_description`
            - `created_at`, `updated_at`, `products`, `lookbooks`
          example: title,slug,excerpt,published_at
      responses:
        '200':
          description: Success
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: '#/components/schemas/Post'
                  pagination:
                    type: object
                    properties:
                      limit:
                        type: integer
                      next_cursor:
                        type:
                          - string
                          - 'null'
                      has_more:
                        type: boolean
                  total:
                    type: integer
              example:
                posts:
                  - id: 154000f5-0dce-4c1e-aacc-873ccb8aab00
                    title: The Best Tech Gifts for 2026
                    slug: best-tech-gifts-2026
                    excerpt: Our editors pick the standout gadgets worth gifting this year — from noise-cancelling headphones to smart wearables.
                    featured_image: https://images.unsplash.com/photo-1513708927688-890fe41dfddc?w=1200&q=80
                    category_name: Buying Guides
                    category_slug: buying-guides
                    status: published
                    published_at: '2026-06-18T11:00:52.880415+00:00'
                    view_count: 128
                    product_count: 2
                  - id: 2b6e9c41-4f7a-4d22-bb0e-7c1d2e3f4a5b
                    title: Building the Perfect Home Office
                    slug: perfect-home-office
                    excerpt: A practical guide to the desk setup that keeps you focused all day.
                    featured_image: https://images.unsplash.com/photo-1497366216548-37526070297c?w=1200&q=80
                    category_name: Buying Guides
                    category_slug: buying-guides
                    status: published
                    published_at: '2026-06-17T09:12:04.110203+00:00'
                    view_count: 64
                    product_count: 3
                pagination:
                  limit: 20
                  next_cursor: null
                  has_more: false
                total: 2
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/ServerError'
