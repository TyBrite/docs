  /v1/ingest/products:
    post:
      operationId: ingestProducts
      tags:
        - Ingestion
      summary: Ingest a batch of products
      description: |
        Push or sync a batch of products into your store from an external source. Accepts
        **JSON, XML, or CSV** — declare the format with the `Content-Type` header
        (`application/json`, `application/xml`, `text/csv`) or the `?format=` query parameter.

        **Upsert by SKU.** A product whose `sku` already exists in your store is **updated**;
        a new `sku` is **created**. Pass `?strategy=create_only` to skip existing SKUs instead
        of updating them.

        **Variants.** Rows that share the same `product_group` value become variants of one
        product (each row needs its own unique `sku`). Rows without a `product_group` are
        single-variant products.

        **Partial success.** Rows are validated and applied independently — one bad row never
        fails the whole batch. The response always carries a `summary` with created / updated /
        skipped / failed counts and an `errors` array describing every rejected row (its
        position, SKU, the offending field, and a human-readable reason). If **every** row
        fails validation the response status is `422`.

        **Required headers** (same signing scheme as orders and payments):
        - `Idempotency-Key` — a unique key per batch; retrying with the same key returns the
          original result instead of re-processing.
        - `X-Timestamp` — unix time in seconds, within 5 minutes of server time.
        - `X-Signature` — base64 HMAC-SHA256 of `` `${X-Timestamp}.${raw_body}` `` signed with
          your store's signing secret (Settings → Integration Settings).

        Tip: validate your feed first with `POST /v1/ingest/test` (no key, no writes).
      security:
        - BearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Unique key per batch; retrying with the same key returns the original result instead of re-importing.
          schema:
            type: string
          example: ingest-1771523993-abc123
        - name: X-Timestamp
          in: header
          required: true
          description: |
            Unix timestamp in seconds (current time). Must be within 5 minutes of server time.
            Used to prevent replay attacks.
          schema:
            type: integer
          example: 1771523993
        - name: X-Signature
          in: header
          required: true
          description: |
            Base64-encoded HMAC-SHA256 of the payload (`${X-Timestamp}.${raw_body}`), signed with your
            HMAC secret from Settings → Integration Settings. Required in addition to the secret key.
          schema:
            type: string
          example: IqdgKXgloLzL5akDgFEwPaK6wviozf+3U0Q2eeevl494gpFUIdwMwALs+6bRn...
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum:
              - json
              - xml
              - csv
          description: Overrides the `Content-Type` for format detection.
        - name: strategy
          in: query
          required: false
          schema:
            type: string
            enum:
              - upsert_by_sku
              - create_only
            default: upsert_by_sku
          description: |
            `upsert_by_sku` (default) updates existing SKUs; `create_only` skips them.
        - name: dry_run
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When `true`, validate and report without writing anything.
      requestBody:
        required: true
        description: |
          A batch of products. For JSON use `{ "products": [ … ] }` (or a bare array). For
          CSV, the first row is a header; for XML, a `<products>` root with `<product>`
          children. Field names are matched leniently (e.g. `Product Name` → `name`).
        content:
          application/json:
            schema:
              type: object
              properties:
                products:
                  type: array
                  items:
                    $ref: '#/components/schemas/IngestProduct'
            examples:
              singleAndVariant:
                summary: One standalone product + one multi-variant product
                value:
                  products:
                    - sku: LAMP-01
                      name: Aurora LED Desk Lamp
                      category: Home
                      brand: Lumio
                      price: 36.9
                      cost_price: 17.2
                      stock: 40
                      threshold: 5
                    - sku: TEE-BLK-S
                      product_group: TEE-CLASSIC
                      name: Classic Cotton Tee
                      variant_name: Black / S
                      category: Apparel
                      price: 22
                      stock: 30
                    - sku: TEE-BLK-M
                      product_group: TEE-CLASSIC
                      name: Classic Cotton Tee
                      variant_name: Black / M
                      category: Apparel
                      price: 22
                      stock: 25
          text/csv:
            schema:
              type: string
            example: |
              sku,product_group,name,category,brand,variant_name,price,cost_price,stock,threshold
              LAMP-01,,Aurora LED Desk Lamp,Home,Lumio,,36.9,17.2,40,5
              TEE-BLK-S,TEE-CLASSIC,Classic Cotton Tee,Apparel,,Black / S,22.0,8.4,30,5
          application/xml:
            schema:
              type: string
            example: |
              <products>
                <product>
                  <sku>LAMP-01</sku>
                  <name>Aurora LED Desk Lamp</name>
                  <price>36.9</price>
                </product>
              </products>
      responses:
        '200':
          description: |
            Batch processed. May be a full success or a partial success — inspect `summary`
            and `errors`. `status` is `success` (no failures) or `partial` (some rows failed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResult'
              example:
                status: partial
                format: json
                strategy: upsert_by_sku
                summary:
                  rows_total: 15
                  rows_created: 9
                  rows_updated: 1
                  rows_skipped: 1
                  rows_failed: 4
                errors:
                  - row: 3
                    sku: TEE-RED-S
                    field: price
                    reason: price must be a positive number
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          description: Missing/invalid secret key, or a missing/invalid request signature.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          description: Every row failed validation; nothing was written.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResult'
        '429':
          $ref: '#/components/responses/RateLimitError'
  /v1/ingest/sample:
