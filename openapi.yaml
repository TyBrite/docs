                order_status: shipped
                payment_status: paid
                tracking_number: 1Z999AA10123456784
                shipped_at: "2026-02-10T10:30:00Z"
                estimated_delivery: "2026-02-15T14:00:00Z"
                total_amount: 2049.97
                items:
