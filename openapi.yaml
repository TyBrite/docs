    PaymentMethod:
      type: object
      properties:
        provider:
          type: string
          description: Machine identifier for the payment method — use this in code (e.g. when initializing a payment).
          enum:
            - cash
            - stripe
            - paypal
            - paystack
            - mpesa
            - mpesa_c2b
          example: stripe
        display_name:
          type: string
          description: Human-friendly label to show the shopper on a "choose payment method" control.
          example: Stripe
        type:
          type: string
          description: 'How the method completes, so a storefront knows what to render: `redirect` (send the shopper to a hosted page), `popup` (render an in-page popup such as PayPal Buttons or Paystack inline), `stk_push` (a prompt is pushed to the customer''s phone), or `manual` (handled out of band, e.g. cash on delivery or paying a Till/Paybill directly).'
          enum:
            - manual
            - redirect
            - popup
            - stk_push
          example: redirect
        environment:
          type: string
          enum:
            - production
            - test
            - sandbox
