  /v1/marketplace/info:
    get:
      operationId: getMarketplaceInfo
      tags:
        - Marketplace
      summary: Get marketplace information
      description: |
        Returns information about a marketplace. **Requires a marketplace operator key.**

        This endpoint has two modes:

        - **No `store_id`** — returns the marketplace's own identity and branding: name, logo,
          primary color, tagline, contact details, and whether unified checkout and commission are
          enabled. Use this to render the marketplace's storefront branding.
        - **With `?store_id=<merchant>`** — returns the same comprehensive store information as
          `GET /v1/store/info`, but for that one merchant within the marketplace. Useful for a
          single-merchant "shop page" or for giving an AI agent context about one merchant. The
          merchant must be active in the marketplace, otherwise `404` is returned. Combine with
          `sections` to request only specific sections of that merchant's information.

        A single-store (non-operator) key receives `403`; use `GET /v1/store/info` instead.

        **Caching:** Responses may be cached for up to 5 minutes.
      security:
        - BearerAuth: []
      parameters:
        - name: store_id
          in: query
          required: false
          description: |
            A merchant's store identifier. When provided, returns that merchant's comprehensive
            store information (same shape as `GET /v1/store/info`). Omit to return the marketplace's
            own identity and branding.
          schema:
            type: string
            format: uuid
          example: 3f1a2b4c-1111-2222-3333-444455556666
        - name: sections
          in: query
          required: false
          description: |
            Only used together with `store_id`. Comma-separated list of sections of the merchant's
            information to include. Omit to return all sections.

            **Available sections:** `catalog`, `pricing`, `promotions`, `payments`, `shipping`,
            `cms`, `features`. The `store` section is always included.
          schema:
            type: string
          example: catalog,features
      responses:
        '200':
          description: |
            Marketplace identity and branding (no `store_id`), or a merchant's comprehensive store
            information (`store_id` provided).
          headers:
            Cache-Control:
              description: Cache control directives
              schema:
                type: string
                example: public, max-age=300
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/MarketplaceInfoResponse'
                  - $ref: '#/components/schemas/StoreInfoResponse'
              examples:
                marketplace_identity:
                  summary: Marketplace identity and branding (no store_id)
                  value:
                    marketplace: true
                    mode: marketplace
                    name: Galactic Market
                    logo_url: https://cdn.example.com/marketplace-logo.png
                    primary_color: '#3B82F6'
                    tagline: Everything you need, from every merchant
                    support_email: support@galacticmarket.example.com
                    description: A curated marketplace of independent merchants.
                    website: https://galacticmarket.example.com
                    phone: +1-555-0100
                    address: 123 Market Street, San Francisco, CA
                    unified_checkout: true
                    commission_enabled: true
                merchant_store_info:
                  summary: One merchant's store information (store_id provided)
                  value:
                    store:
                      store_id: 3f1a2b4c-1111-2222-3333-444455556666
                      name: Acme Audio
                      logo_url: https://cdn.example.com/acme-logo.png
                      description: Premium audio gear.
                      website: https://acme-audio.example.com
                      phone: +1-555-0123
                      email: hello@acme-audio.example.com
                      address: 42 Sound Ave, Austin, TX
                      default_currency: USD
                      currencies:
                        - USD
                        - EUR
                      timezone: America/Chicago
                      created_at: '2025-12-16T07:20:56.276495+00:00'
                    marketplace:
                      mode: marketplace
                      marketplace_enabled: true
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/ServerError'
  /v1/marketplace/ad-slots/{slot_key}:
    get:
      operationId: getAdSlot
      tags:
        - Marketplace
      summary: Get placements for a slot
      description: |
        Returns the active placements to render in a named slot on a marketplace storefront (for
        example a hero banner, a category strip, or search results). **Requires a marketplace
        operator key.**

        A slot can return two kinds of placement. **Sponsored** placements (`sponsored: true`) are
        paid advertising and **must be rendered with their `disclosure_label`** (for example
        "Sponsored") so shoppers can tell them apart from organic results. **Curated fallback**
        placements (`curated: true, sponsored: false`) are hand-picked by the marketplace operator
        to fill the slot when no paid placement is available; they are **not** labelled as sponsored.
        Only sponsored placements require the disclosure label.

        Blend placements with your organic listings or recommendations as appropriate for the slot.

        Use the optional `context` parameter to request placements scoped to a category or a search
        term, and `limit` to cap how many placements come back.

        After rendering, log a beacon with `POST /v1/marketplace/ad-events`: one `impression` per
        placement when it becomes visible, and a `click` when the shopper clicks it.
      security:
        - BearerAuth: []
      parameters:
        - name: slot_key
          in: path
          required: true
          description: The slot to fill, for example `home_hero` or `category_top`.
          schema:
            type: string
          example: home_hero
        - name: context
          in: query
          required: false
          description: Optional context for context-scoped slots — a category identifier or a search term — used to pick placements relevant to what the shopper is viewing.
          schema:
            type: string
          example: electronics
        - name: limit
          in: query
          required: false
          description: Maximum number of placements to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 5
      responses:
        '200':
          description: The active placements for the slot.
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdSlotResponse'
              example:
                slot: home_hero
                context: null
                placements:
                  - booking_id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                    merchant_store_id: 3f1a2b4c-1111-2222-3333-444455556666
                    placement_kind: product
                    product_ids:
                      - 715b8c10-eb11-4289-8c0e-2966e78cf9a5
                      - 9cd6e472-de84-435c-be43-957b56682f43
                    creative:
                      headline: Summer audio sale
                      image_url: https://cdn.example.com/ads/acme-hero.png
                      cta: Shop now
                    sponsored: true
                    disclosure_label: Sponsored
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /v1/marketplace/ad-events:
    post:
      operationId: logAdEvent
      tags:
        - Marketplace
      summary: Log an ad impression or click
      description: |
        Records an impression or click beacon for a sponsored placement. **Requires a marketplace
        operator key.**

        This is fire-and-forget: fire one `impression` per placement when it becomes visible, and a
        `click` when the shopper clicks it. Pass the `booking_id` from the placement you rendered.

        The response returns `202 Accepted` with `billable` indicating whether the event counted
        toward billing after de-duplication and invalid-traffic filtering. This is informational —
        the storefront does not need to act on it.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - booking_id
                - event_type
              properties:
                booking_id:
                  type: string
                  format: uuid
                  description: The placement's identifier, taken from the slot response.
                event_type:
                  type: string
                  enum:
                    - impression
                    - click
                  description: Whether the placement was shown (`impression`) or clicked (`click`).
                product_id:
                  type: string
                  format: uuid
                  description: Optional — the specific product within the placement the event relates to.
                session_id:
                  type: string
                  description: Optional — an opaque storefront session identifier used to de-duplicate events.
            examples:
              impression:
                summary: Impression beacon
                value:
                  booking_id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                  event_type: impression
                  session_id: sess_abc123
              click:
                summary: Click beacon
                value:
                  booking_id: 7c9e6679-7425-40de-944b-e07fc1f90ae7
                  event_type: click
                  product_id: 715b8c10-eb11-4289-8c0e-2966e78cf9a5
                  session_id: sess_abc123
      responses:
        '202':
          description: The beacon was accepted.
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdEventResponse'
              example:
                recorded: true
                billable: true
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /v1/marketplace/collections:
    get:
      operationId: listMarketplaceCollections
      tags:
        - Marketplace
      summary: List operator-curated merchandising sections
      description: |
        Returns the merchandising sections the marketplace operator has curated for the storefront —
        for example "Trending now", "Featured shops", or a seasonal promotion rail. Each section
        groups products, merchants, or promotions the operator hand-picked (or auto-curated) to
        merchandise the storefront. **Requires a marketplace operator key.**

        Use these to render homepage sections, and blend them with sponsored placements and organic
        recommendations as appropriate. Fetch a section's resolved members with
        `GET /v1/marketplace/collections/{slug}`.

        Use the optional `placement_kind` parameter to return only sections of a given kind.
      security:
        - BearerAuth: []
      parameters:
        - name: placement_kind
          in: query
          required: false
          description: Return only sections of this kind.
          schema:
            type: string
            enum:
              - product
              - merchant
              - promotion
          example: product
      responses:
        '200':
          description: The operator-curated merchandising sections.
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceCollectionListResponse'
              example:
                collections:
                  - slug: trending-now
                    name: Trending now
                    description: The most popular products across the marketplace this week.
                    placement_kind: product
                    display_priority: 10
                    show_on_homepage: true
                  - slug: featured-shops
                    name: Featured shops
                    description: Merchants worth a look.
                    placement_kind: merchant
                    display_priority: 20
                    show_on_homepage: true
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /v1/marketplace/collections/{slug}:
    get:
      operationId: getMarketplaceCollection
      tags:
        - Marketplace
      summary: Get one curated section with its members
      description: |
        Returns a single curated merchandising section together with its resolved members. The
        members are products, merchants, or promotions hand-picked (or auto-curated) by the
        marketplace operator to merchandise the storefront. **Requires a marketplace operator key.**

        Render the section as a homepage rail and blend it with sponsored placements and organic
        recommendations as appropriate.

        Use the optional `limit` parameter to cap how many members come back.
      security:
        - BearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          description: The section's slug, taken from the section list.
          schema:
            type: string
          example: trending-now
        - name: limit
          in: query
          required: false
          description: Maximum number of members to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
          example: 12
      responses:
        '200':
          description: The curated section and its members.
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketplaceCollectionDetail'
              example:
                slug: trending-now
                name: Trending now
                description: The most popular products across the marketplace this week.
                placement_kind: product
                curated: true
                items:
                  - merchant_store_id: 3f1a2b4c-1111-2222-3333-444455556666
                    product_id: 715b8c10-eb11-4289-8c0e-2966e78cf9a5
                  - merchant_store_id: 3f1a2b4c-1111-2222-3333-444455556666
                    product_id: 9cd6e472-de84-435c-be43-957b56682f43
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: |
        **API Key Authentication**
            
        Use your API key in the Authorization header:
        ```
        Authorization: Bearer tybrite_sk_live_YOUR_KEY
        ```
            
        **Key Types:**
            
        **Secret Keys (Server-Side Only):**
        - Format: `tybrite_sk_live_*` (production) or `tybrite_sk_test_*` (sandbox)
        - Full read/write access to all endpoints
        - ⚠️ NEVER expose in client-side code or public repositories
        - Required for: write operations, authentication, payment verification, AI recommendations
            
        **Publishable Keys (Client-Safe):**
        - Format: `tybrite_pk_live_*` (production) or `tybrite_pk_test_*` (sandbox)
        - Read-only access (GET requests only, plus POST semantic search)
        - ✅ Safe for client-side JavaScript, mobile apps, and public code
        - Allowed for: browsing products, search, CMS content, pricing queries
            
        **Endpoint-Specific Requirements:**
        - **Authentication endpoints** (`/v1/auth/*`): Secret key required
        - **Payment verification** (`POST /v1/payments/verify`): Secret key required
        - **AI Recommendations** (`POST /v1/recommendations`): Secret key required
        - **Semantic Search** (`POST /v1/search`): Both key types allowed (read-only operation)
        - **All write operations**: Secret key required
        - **All read operations**: Both key types allowed
            
        Using a publishable key for restricted operations returns 403 Forbidden.
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
            - down
          description: Overall API status
        gateway:
          type: string
          enum:
            - ok
          description: Gateway process status (always ok if this response is received)
        latency_ms:
          type: integer
          description: Total time in milliseconds to probe all services
        workers:
          type: object
          description: Per-service status map
          additionalProperties:
            type: object
            properties:
              status:
                type: string
                enum:
                  - ok
                  - error
              latency_ms:
                type:
                  - integer
                  - 'null'
                description: Time in milliseconds to probe this service (null if it did not respond)
        timestamp:
          type: string
          format: date-time
        version:
          type: string
          example: 1.0.0
    StoreInfoResponse:
      type: object
      required:
        - store
      properties:
        store:
          type: object
          description: Basic store information (always included)
          required:
            - store_id
            - name
            - default_currency
            - currencies
            - timezone
            - created_at
          properties:
            store_id:
              type: string
              format: uuid
              description: Unique store identifier
            name:
              type: string
              description: Store display name
            logo_url:
              type:
                - string
                - 'null'
              description: URL of the store's logo, or null if not set.
            description:
              type:
                - string
                - 'null'
              description: Short description of the store, or null if not set.
            website:
              type:
                - string
                - 'null'
              description: Store's public website URL, or null if not set.
            phone:
              type:
                - string
                - 'null'
              description: Store contact phone number, or null if not set.
            email:
              type:
                - string
                - 'null'
              description: Store contact email, or null if not set.
            address:
              type:
                - string
                - 'null'
              description: Store physical or business address, or null if not set.
            default_currency:
              type: string
              description: Store's default currency code (ISO 4217)
            currencies:
              type: array
              description: List of active currency codes supported by the store
              items:
                type: string
            timezone:
              type: string
              description: Store timezone (IANA timezone identifier)
            created_at:
              type: string
              format: date-time
              description: Store creation timestamp
        catalog:
          type: object
          description: Catalog overview (optional, included when requested)
          properties:
            products:
              type: object
              properties:
                total:
                  type: integer
                has_variants:
                  type: integer
                simple_products:
                  type: integer
                active:
                  type: integer
                inactive:
                  type: integer
                featured:
                  type: integer
                with_images:
                  type: integer
                low_stock:
                  type: integer
                sample:
                  type: array
                  description: A small sample of products (at most 10) for context — useful for AI agents and overview screens. This is NOT the full catalog; use the products endpoint to browse all products.
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      category:
                        type:
                          - string
                          - 'null'
                      price:
                        type:
                          - number
                          - 'null'
                      image:
                        type:
                          - string
                          - 'null'
                      featured:
                        type: boolean
            collections:
              type: object
              properties:
                total:
                  type: integer
                names:
                  type: array
                  items:
                    type: string
            taxonomy:
              type: object
              properties:
                categories:
                  type: object
                  properties:
                    total:
                      type: integer
                    list:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          name:
                            type: string
                          image:
                            type:
                              - string
                              - 'null'
                            description: Category image URL, if the merchant set one.
                          product_count:
                            type: integer
                subcategories:
                  type: object
                  properties:
                    total:
                      type: integer
                    list:
                      type: array
                      items:
                        type: object
                        description: |
                          A subcategory, with enough hierarchy to build breadcrumbs and walk the nested
                          tree from this response alone: `parent_id`/`parent_name` (null for a top-level
                          subcategory) and `children` (the ids of its direct child subcategories).
                        properties:
                          id:
                            type: string
                            format: uuid
                          name:
                            type: string
                          image:
                            type:
                              - string
                              - 'null'
                            description: Subcategory image URL, if the merchant set one.
                          category:
                            type: string
                            description: Name of the top-level category this subcategory belongs to.
                          category_id:
                            type:
                              - string
                              - 'null'
                            format: uuid
                          parent_id:
                            type:
                              - string
                              - 'null'
                            format: uuid
                            description: The parent subcategory's id, or null for a top-level subcategory.
                          parent_name:
                            type:
                              - string
                              - 'null'
                            description: The parent subcategory's name, or null for a top-level subcategory.
                          children:
                            type: array
                            description: Ids of this subcategory's direct (one-level-down) child subcategories.
                            items:
                              type: string
                              format: uuid
                          product_count:
                            type: integer
            specifications:
              type: object
              properties:
                total:
                  type: integer
                types:
                  type: array
                  items:
                    type: string
            brands:
              type: object
              properties:
                total:
                  type: integer
                list:
                  type: array
                  items:
                    type: string
        pricing:
          type: object
          description: Pricing configuration (optional, included when requested)
          properties:
            has_dynamic_pricing:
              type: boolean
            features:
              type: object
              properties:
                customer_tiers:
                  type: boolean
                customer_segments:
                  type: boolean
                volume_discounts:
                  type: boolean
                location_based:
                  type: boolean
                time_based:
                  type: boolean
            customer_tiers:
              type: array
              items:
                type: string
            pricing_rules:
              type: object
              properties:
                total:
                  type: integer
                active:
                  type: integer
        promotions:
          type: object
          description: Promotions overview (optional, included when requested)
          properties:
            total:
              type: integer
            active:
              type: integer
            types:
              type: object
              properties:
                percentage_discount:
                  type: integer
                fixed_discount:
                  type: integer
                bogo:
                  type: integer
                bundle:
                  type: integer
                free_shipping:
                  type: integer
        payments:
          type: object
          description: Payment configuration (optional, included when requested)
          properties:
            providers:
              type: array
              items:
                type: string
            methods:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  display_name:
                    type: string
                  type:
                    type: string
                    enum:
                      - manual
                      - redirect
                      - popup
                      - stk_push
        shipping:
          type: object
          description: Shipping configuration (optional, included when requested)
          properties:
            zones:
              type: object
              properties:
                total:
                  type: integer
                  description: Number of shipping rules — the combined count of custom delivery zones and distance-based pricing tiers (equals `list.length`).
                list:
                  type: array
                  description: Both custom polygon delivery zones and distance-based pricing tiers, each tagged with its `type`.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                        enum:
                          - zone
                          - distance_tier
                        description: '`zone` = a custom polygon delivery zone; `distance_tier` = a distance-based pricing tier.'
                      delivery_fee:
                        type: number
                      free_threshold:
                        type:
                          - number
                          - 'null'
            has_free_shipping_threshold:
              type: boolean
        cms:
          type: object
          description: CMS content overview (optional, included when requested)
          properties:
            posts:
              type: object
              properties:
                total:
                  type: integer
                published:
                  type: integer
                draft:
                  type: integer
            lookbooks:
              type: object
              properties:
                total:
                  type: integer
                published:
                  type: integer
        features:
          type: object
          description: Feature flags (optional, included when requested). Each flag reports whether a capability is actually available to this store right now. Plan-dependent capabilities (smart search & recommendations, dynamic pricing, multi-currency, content pages & lookbooks, returns) report `true` only when the store's plan includes them AND they are configured; a storefront should use these flags to decide which UI to show.
          properties:
            ai_recommendations:
              type: boolean
              description: Smart recommendations are available (plan-dependent and configured).
            semantic_search:
              type: boolean
              description: Smart search is available (plan-dependent and configured).
            multi_currency:
              type: boolean
              description: Selling in multiple currencies is available (plan-dependent and configured).
            dynamic_pricing:
              type: boolean
              description: Automatic pricing rules are available (plan-dependent and configured).
            gift_cards:
              type: boolean
            promotions:
              type: boolean
            cms:
              type: boolean
              description: The store publishes content pages (plan-dependent and configured).
            lookbooks:
              type: boolean
              description: The store publishes shoppable lookbooks (plan-dependent and configured).
            returns:
              type: boolean
              description: The store accepts customer-lodged returns (Settings → General → Returns).
            messaging:
              type: boolean
            specifications:
              type: boolean
            collections:
              type: boolean
              description: The store has product collections (storefront catalog groupings) to display.
        marketplace:
          type: object
          description: Indicates whether this store is part of a marketplace, so a storefront can adapt its experience accordingly.
          properties:
            mode:
              type: string
              enum:
                - standard
                - marketplace
              description: Whether the store runs on its own or inside a marketplace.
            marketplace_enabled:
              type: boolean
              description: Whether marketplace features are available.
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: invalid_request
            message:
              type: string
              example: Missing required field
            details:
              type: string
              example: The 'email' field is required
            hint:
              type: string
              description: Additional guidance on how to resolve the error.
            available_stock:
              type: integer
              description: Current stock level (present on insufficient_stock errors).
            current_cart_quantity:
              type: integer
              description: Quantity already in cart (present on insufficient_stock errors).
            limit:
              type: integer
              description: Rate limit ceiling (present on rate_limit_exceeded errors).
            remaining:
              type: integer
              description: Requests remaining in the current window (present on rate_limit_exceeded errors).
            reset:
              type: integer
              description: Unix timestamp when the rate limit window resets (present on rate_limit_exceeded errors).
    ProductVariant:
      type: object
      description: |
        Represents a single product variant with only variant-specific fields.
        Product-level attributes (name, description, brand, etc.) are NOT duplicated here.
            
        **Field Filtering:**
        Use dot notation to filter variant fields: variants.sku,variants.selling_price,variants.stock
        This can reduce payload size by up to 52% by excluding internal fields like threshold, last_restocked.
      properties:
        variant_id:
          type: string
          format: uuid
          description: Unique variant identifier
          example: 83b6a47e-4f5c-4090-b8d3-4b606b78f1b4
        sku:
          type: string
          description: Stock Keeping Unit for this variant
          example: SNY-WH1002
        price:
          type: number
          description: Base price in cents
          example: 36999
        sale_price:
          type:
            - number
            - 'null'
          description: Sale price in cents (null if not on sale)
        selling_price:
          type: number
          description: Actual customer-facing price in cents (considers sale_price)
          example: 34999
        stock:
          type: integer
          description: Available stock quantity for this variant
          example: 10
        threshold:
          type:
            - integer
            - 'null'
          description: Low stock threshold (internal inventory field)
          example: 5
        last_restocked:
          type:
            - string
            - 'null'
          format: date
          description: Last restock date (internal inventory field)
          example: '2026-02-17'
        variant_attributes:
          type:
            - object
            - 'null'
          additionalProperties: true
          description: Variant-specific attributes (e.g., color, size, material)
          example:
            color: Black
        variant_name:
          type:
            - string
            - 'null'
          description: Display name for this variant
          example: Variant 3
        is_default:
          type: boolean
          description: Whether this is the default variant
          example: false
        media:
          type: array
          description: Array of media objects specific to this variant
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              url:
                type: string
                format: uri
              type:
                type: string
                example: image
              position:
                type: integer
              alt_text:
                type:
                  - string
                  - 'null'
              is_primary:
                type: boolean
    Product:
      type: object
      description: |
        Represents a product in the catalog. Response structure varies based on endpoint and variant configuration:
            
        **List Endpoint (GET /v1/products):**
        - Returns flat structure with default variant data only
        - No variants array (keeps payload small for browsing)
        - Includes has_variants flag to indicate if detail fetch needed
            
        **Detail Endpoints (GET /v1/products/:id, GET /v1/products/by-slug/:slug):**
        - Multi-variant products: Hierarchical structure with product-level data at root + variants array
        - Simple products: Flat structure with all data at root (no variants array)
            
        **Field Filtering:**
        - Root-level filtering: Reduce top-level fields 
        - Nested filtering: Filter specific variant fields using dot notation 
        - Example: fields=name,price_range,variants.sku,variants.selling_price,variants.stock
      properties:
        id:
          type: string
          format: uuid
          description: Product identifier. Identical to `product_id`.
          example: d8cea277-9bb6-4942-b9e9-2f2ac351509f
        product_id:
          type: string
          format: uuid
          description: Product identifier. Identical to `id`.
          example: d8cea277-9bb6-4942-b9e9-2f2ac351509f
        name:
          type: string
          description: Product name
          example: Sony WH-1000XM4
        description:
          type: string
          description: Product description
          example: Wireless noise-cancelling headphones
        category_id:
          type:
            - string
            - 'null'
          format: uuid
          description: Category UUID
        category_name:
          type:
            - string
            - 'null'
          description: Category display name
          example: Electronics
        subcategory_id:
          type:
            - string
            - 'null'
          format: uuid
          description: Subcategory UUID
        subcategory_name:
          type:
            - string
            - 'null'
          description: Subcategory display name
          example: Headphones
        brand:
          type:
            - string
            - 'null'
          description: Product brand
          example: Sony
        thumbnail_url:
          type:
            - string
            - 'null'
          format: uri
          description: Primary image URL for list views
          example: https://cdn.tybritelabs.com/stores/.../primary-123.jpg
        media:
          type: array
          description: Array of product media objects including images and videos
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              url:
                type: string
                format: uri
              type:
                type: string
                example: image
              position:
                type: integer
              alt_text:
                type:
                  - string
                  - 'null'
              is_primary:
                type: boolean
        product_slug:
          type:
            - string
            - 'null'
          description: SEO-friendly URL slug
          example: sony-wh-1000xm4-abc123
        seo_title:
          type:
            - string
            - 'null'
          description: SEO title for the product detail page
          example: Sony WH-1000XM4 Wireless Noise-Cancelling Headphones
        seo_description:
          type:
            - string
            - 'null'
          description: SEO meta description for the product detail page
          example: Industry-leading noise cancellation with 30-hour battery life. Shop the Sony WH-1000XM4 today.
        seo_keywords:
          type:
            - array
            - 'null'
          items:
            type: string
          description: SEO keywords for the product
          example:
            - wireless headphones
            - noise cancelling
            - sony
        featured:
          type:
            - boolean
            - 'null'
          description: Whether product is featured
        featured_order:
          type:
            - integer
            - 'null'
          description: Display order for featured products
        tags:
          type:
            - array
            - 'null'
          items:
            type: string
          description: Product tags
        attributes:
          type:
            - object
            - 'null'
          additionalProperties: true
          description: Product-level attributes (not variant-specific)
        shipping_info:
          type:
            - object
            - 'null'
          description: Shipping dimensions and weight
          properties:
            weight:
              type: number
            dimensions:
              type: object
              properties:
                length:
                  type: number
                width:
                  type: number
                height:
                  type: number
        created_at:
          type:
            - string
            - 'null'
          format: date-time
          description: Product creation timestamp
        updated_at:
          type:
            - string
            - 'null'
          format: date-time
          description: Last update timestamp
        is_active:
          type:
            - boolean
            - 'null'
          description: Whether product is active
        variant_id:
          type:
            - string
            - 'null'
          format: uuid
          description: Variant identifier (only present for simple products or list endpoint)
          example: cc35d16b-fca5-4faa-8699-d3d5d3521bca
        sku:
          type:
            - string
            - 'null'
          description: Stock Keeping Unit (only present for simple products or list endpoint)
          example: SNY-WH1000
        price:
          type:
            - number
            - 'null'
          description: Base price in cents (only present for simple products or list endpoint)
          example: 36999
        sale_price:
          type:
            - number
            - 'null'
          description: Sale price in cents if on sale
        selling_price:
          type:
            - number
            - 'null'
          description: Actual customer-facing price (considers sale_price)
          example: 34999
        stock:
          type:
            - integer
            - 'null'
          description: Available stock quantity (only present for simple products or list endpoint)
          example: 40
        threshold:
          type:
            - integer
            - 'null'
          description: Low stock threshold
        last_restocked:
          type:
            - string
            - 'null'
          format: date
          description: Last restock date
        variant_attributes:
          type:
            - object
            - 'null'
          additionalProperties: true
          description: Variant-specific attributes (e.g., color, size)
          example:
            color: Black
        variant_name:
          type:
            - string
            - 'null'
          description: Variant display name
        is_default:
          type:
            - boolean
            - 'null'
          description: Whether this is the default variant
        total_stock:
          type:
            - integer
            - 'null'
          description: Sum of stock across all variants (only present for multi-variant products)
          example: 85
        price_range:
          type:
            - object
            - 'null'
          description: Price range across variants using selling_price (only present for multi-variant products)
          properties:
            min:
              type: number
              description: Minimum selling price in cents
              example: 34999
            max:
              type: number
              description: Maximum selling price in cents
              example: 38999
        has_variants:
          type: boolean
          description: Whether product has multiple variants
          example: true
        variant_count:
          type:
            - integer
            - 'null'
          description: Number of variants (only present for multi-variant products)
          example: 3
        display_currency:
          type: string
          description: Store's default currency code
          example: EUR
        currency_symbol:
          type: string
          description: Currency symbol
          example: €
        variants:
          type:
            - array
            - 'null'
          description: Array of product variants (only present for multi-variant products in detail endpoints)
          items:
            $ref: '#/components/schemas/ProductVariant'
    ProductCollection:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Summer Sale
        slug:
          type: string
          example: summer-sale
        description:
          type: string
        collection_type:
          type: string
          description: |
            The kind of collection. `featured_collections` is a manually curated set;
            `new_arrivals` and `best_selling` are automatically maintained.
          enum:
            - featured_collections
            - new_arrivals
            - best_selling
            - manual
            - automated
            - smart
        is_active:
          type: boolean
        show_on_homepage:
          type: boolean
        display_priority:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Electronics
        description:
          type: string
        image:
          type:
            - string
            - 'null'
          format: uri
          description: URL of the category image
        active:
          type: boolean
          description: Whether the category is active
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Subcategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        parent_id:
          type:
            - string
            - 'null'
          format: uuid
          description: ID of the parent subcategory, or null for a top-level subcategory directly under its category. Subcategories can be nested to arbitrary depth (e.g. Shoes → Men's → Sneakers).
        name:
          type: string
          example: Keyboards
        description:
          type: string
        image:
          type:
            - string
            - 'null'
          format: uri
          description: URL of the subcategory image
        active:
          type: boolean
          description: Whether the subcategory is active
        children:
          type: array
          description: Nested child subcategories. Only included when listing subcategories with tree=true, or when fetching a single subcategory with include=children; omitted otherwise.
          items:
            $ref: '#/components/schemas/Subcategory'
        ancestors:
          type: array
          description: Ancestor breadcrumb chain, ordered from the top-level subcategory down to the immediate parent (root-first). Only included when fetching a single subcategory with include=ancestors; empty for a top-level subcategory, omitted otherwise.
          items:
            $ref: '#/components/schemas/Subcategory'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Address:
