  /v1/messaging/threads:
    get:
      operationId: listThreads
      tags:
        - Messaging
      summary: List message threads
      description: |
        Returns messaging threads filtered by customer. Supports cursor-based pagination, field
        filtering, and server-side status/priority/archived/unread filtering. Pinned threads are
        returned first in the result set.
      security:
        - BearerAuth: []
      parameters:
        - name: x-auth-token
          in: header
          required: true
          description: Customer session access_token. Required to prove ownership of the thread/message being accessed.
          schema:
            type: string
        - name: customer_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
          description: Customer UUID to filter threads by
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - active
              - resolved
              - closed
              - escalated
              - pending
          description: Filter threads by status
        - name: priority
          in: query
          required: false
          schema:
            type: string
            enum:
              - urgent
              - high
              - normal
              - low
          description: Filter by priority level
        - name: thread_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - general
              - order_inquiry
              - product_inquiry
              - support
              - complaint
              - delivery
              - return
              - refund
              - technical
          description: Filter by thread type
        - name: archived
          in: query
          required: false
          schema:
            type: boolean
          description: true = archived threads only, false = non-archived only, omit = no filter
        - name: unread
          in: query
          required: false
          schema:
            type: boolean
          description: Set to true to return only threads with unread_count_store > 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: cursor
          in: query
          description: Cursor for pagination (base64-encoded last_message_at value)
          schema:
            type: string
        - name: fields
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of fields to include in the response.
              
            **Allowed Fields:**
            - `id`, `customer_id`, `customer_name`, `customer_email`, `customer_phone`
            - `store_name`, `store_avatar`, `order_id`, `product_id`
            - `subject`, `thread_type`, `status`, `priority`
            - `last_message_at`, `last_message_by`, `unread_count_customer`, `unread_count_store`
            - `is_archived`, `is_muted`, `is_pinned`
            - `created_at`, `updated_at`
          example: subject,status,last_message_at,is_pinned
      responses:
        '200':
          description: Success
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                type: object
                properties:
                  threads:
                    type: array
                    items:
                      $ref: '#/components/schemas/Thread'
                  pagination:
                    type: object
                    properties:
                      limit:
                        type: integer
                      next_cursor:
                        type:
                          - string
                          - 'null'
                      has_more:
                        type: boolean
              example:
                threads:
                  - id: de30ebb3-d8d0-4b55-9ca6-e2f2d9ac2383
                    subject: Question about my order
                    status: active
                    priority: normal
                    thread_type: order_inquiry
                    last_message_at: '2026-06-20T13:48:15.303+00:00'
                    last_message_by: customer
                    unread_count_customer: 0
                    unread_count_store: 1
                    is_archived: false
                    is_muted: false
                    is_pinned: false
                pagination:
                  limit: 50
                  next_cursor: null
                  has_more: false
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/ServerError'
