            Filter to a single variant's specifications. Despite the name, this matches on
            `variant_id` — pass a **variant** UUID.
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by specification status (e.g. `draft`, `published`)
          schema:
            type: string
        - name: limit
