  /v1/subcategories/{id}:
    get:
      operationId: getSubcategory
      tags:
        - Taxonomy
      summary: Get subcategory by ID
      description: Retrieve a single subcategory by ID. Use the include parameter to also receive the subcategory's direct children and/or its ancestor breadcrumb chain. Accepts both publishable and secret API keys.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: include
          in: query
          description: 'Comma-separated list of related data to nest on the response. Supported values: children (the subcategory''s direct, one-level-down child subcategories, as a children array) and ancestors (the breadcrumb chain from the top-level subcategory down to the immediate parent, as an ancestors array ordered root-first; empty for a top-level subcategory). Combine them, e.g. include=ancestors,children. Omit for a flat subcategory object.'
          schema:
            type: string
            example: ancestors,children
        - name: fields
          in: query
          schema:
            type: string
          description: Comma-separated list of fields to include in the response.
          example: id,name
