    get:
      operationId: getThreadMessages
      tags:
        - Messaging
      summary: Get messages in a thread
      description: |
        Returns messages in a thread. Soft-deleted messages are excluded by default.
        Supports cursor-based pagination and sort order (default: oldest first).
      security:
        - BearerAuth: []
      parameters:
        - name: x-auth-token
          in: header
          required: true
          description: Customer session access_token. Required to prove ownership of the thread/message being accessed.
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: cursor
          in: query
          description: Cursor for pagination (base64-encoded created_at value)
          schema:
            type: string
        - name: order
          in: query
          description: Sort order — asc (oldest first, default) or desc (newest first)
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
        - name: fields
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of fields to include in the response.
              
            **Allowed Fields:**
            - `id`, `message_content`, `message_type`, `sender_type`, `sender_id`
            - `sender_name`, `attachments`, `metadata`, `message_status`, `read_at`
            - `is_edited`, `is_deleted`
            - `created_at`, `updated_at`
          example: message_content,sender_name,created_at,is_edited
