  /v1/prices/products:
    get:
      operationId: getProductPrices
      tags:
        - Pricing
      summary: Get prices for multiple products with dynamic pricing and multi-currency support
      description: |
        Calculate dynamic prices for products based on customer segment, location, volume, and geographic currency detection.
        
        **Multi-Currency Support:**
        - Automatically detects currency based on customer location (coordinates or place name)
        - Converts prices from store's base currency to detected currency
        - Falls back to store's default currency if no location provided
        - Works with both simple and multi-variant products
        
        **Multi-Variant Support:**
        - Returns flat structure with default variant data (keeps payload small for browsing)
        - Use `has_variants` flag to determine if detail fetch needed
        - For full variant pricing, use GET /v1/prices/products/:id endpoint
        
        **Dynamic Pricing:**
        - Customer segment-based pricing (RFM segmentation)
        - Customer tier-based pricing (Gold, Silver, Bronze)
        - Volume/quantity-based discounts
        - Region-specific pricing rules
        - Time-based promotions
        
        **Field Filtering:**
        - Use `fields` parameter to reduce bandwidth by 50-90%
        - Supports nested fields with dot notation
        - Example: `fields=name,display_price,display_currency,price_breakdown.base_price`
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by product name or SKU
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by category UUID
        - name: subcategory_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by subcategory UUID
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
          description: Maximum number of products to return (1-200)
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of products to skip for pagination
        - name: fields
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of fields to return (reduces bandwidth by 50-90%).
            
            **Allowed fields:** product_id, variant_id, name, sku, description, price, selling_price,
            stock, image, category_name, brand, has_variants, variant_count, total_stock,
            base_price, resolved_price, display_price, base_currency, display_currency, currency_symbol, 
            exchange_rate, price_breakdown, price_breakdown.*, pricing_context, pricing_context.*
            
            **Example:** `fields=name,display_price,display_currency,currency_symbol,has_variants`
          example: name,display_price,display_currency,currency_symbol
        - name: place_name
          in: query
          schema:
            type: string
          description: |
            City or region name for geographic currency detection (e.g., "New York, USA", "London, UK", "Nairobi, Kenya").
            
            **How it works:**
            1. Geocodes place name to coordinates 
            2. Matches coordinates to currency regions
            3. Returns prices in detected currency
            
            **Examples:**
            - `place_name=New York` → USD
            - `place_name=London` → GBP
            - `place_name=Nairobi, Kenya` → KES
          example: "New York, USA"
        - name: latitude
          in: query
          schema:
            type: number
            format: double
          description: |
            Customer latitude for precise geographic currency detection.
            
            **Priority:** Coordinates take priority over place_name if both provided.
            
            **Accuracy:** Uses PostGIS boundary matching for accurate region detection.
            
            **Works with variants:** Currency detection applies to all product variants.
            
            **Example:** `latitude=40.7128&longitude=-74.0060` (New York) → USD
          example: 40.7128
        - name: longitude
          in: query
          schema:
            type: number
            format: double
          description: |
            Customer longitude for precise geographic currency detection.
            
            **Must be used with latitude parameter.**
            
            **Example:** `latitude=51.5074&longitude=-0.1278` (London) → GBP
          example: -74.0060
        - name: location
          in: query
          schema:
            type: string
          description: |
            **DEPRECATED:** Use `place_name` instead for better geocoding support.
            
            Location/country for location-based pricing rules.
          deprecated: true
        - name: region
          in: query
          schema:
            type: string
          description: Manual region override for pricing rules (bypasses automatic detection)
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
          description: Customer UUID for personalized pricing (segment/tier-based)
        - name: customer_segment
          in: query
          schema:
            type: string
          description: |
            RFM customer segment for segment-based pricing.
            
            **Segments:** Champions, Loyal, Potential, New, At Risk, Hibernating, Lost
          example: Champions
        - name: customer_tier
          in: query
          schema:
            type: string
          description: |
            Customer tier for tier-based pricing.
            
            **Tiers:** Gold, Silver, Bronze, VIP
          example: Gold
        - name: quantity
          in: query
          schema:
            type: integer
            minimum: 1
          description: Quantity for volume-based pricing discounts
      responses:
        "200":
          description: |
            Successfully retrieved products with dynamic pricing and currency conversion.
            
            **Response includes:**
            - Products with converted prices in detected/default currency
            - Price breakdown showing base price, discounts, and final price
            - Pricing context with currency info and detection method
            - Pagination metadata
            
            **Note:** List endpoint returns flat structure with default variant only.
            For full variant pricing, use GET /v1/prices/products/:id
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        product_id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        sku:
                          type: string
                        base_price:
                          type: number
                          description: Price in store's base currency (before conversion)
                        base_currency:
                          type: string
                          description: Store's base currency code (e.g., EUR, USD)
                          example: EUR
                        resolved_price:
                          type: number
                          description: Price after discounts but before currency conversion
                        display_price:
                          type: number
                          description: Price in customer's currency (after conversion and discounts)
                          example: 225451.29
                        display_currency:
                          type: string
                          description: Customer's currency code
                          example: USD
                        currency_symbol:
                          type: string
                          description: Currency symbol for display
                          example: $
                        exchange_rate:
                          type: number
                          format: float
                          description: Exchange rate applied (1.0 if same currency)
                          example: 1.19
                        has_variants:
                          type: boolean
                          description: Whether product has multiple variants
                        price_breakdown:
                          type: object
                          description: Detailed price calculation breakdown
                          properties:
                            base_price:
                              type: number
                              description: Original price before discounts
                            discounts:
                              type: array
                              description: Applied discount rules
                              items:
                                type: object
