  /v1/checkout/reserve:
    post:
      operationId: reserveStock
      tags:
        - Orders
      summary: Reserve stock for checkout
      description: |
        **Optional.** Holds stock for the items a customer is checking out so the
        units can't be sold to someone else while they complete payment.

        Use this when there is a gap between "customer commits to buy" and "payment
        confirms" — card redirects, 3‑D Secure, or mobile‑money push prompts — so
        the stock is claimed *before* the customer pays and a second shopper racing
        for the last unit is turned away up front. For instant‑capture or fully
        synchronous flows you can skip it and call `POST /v1/orders` directly;
        Galactic Core still prevents stock from going negative at order time. In
        other words, reserving is a stronger guarantee for async payments, not a
        mandatory step before every order.

        Reservations are all‑or‑nothing: if any item lacks available stock, nothing
        is reserved and the response is `409`. Each hold expires automatically after
        a window (15 minutes by default). Pass the returned `reservation_ids` to
        `POST /v1/orders` (or when you `PATCH` an order to `paid`) and Galactic Core
        converts the hold into the actual stock deduction. If the customer abandons
        checkout, the hold simply expires and the stock returns to availability —
        you don't need to release it explicitly.

        Works with both publishable and secret keys (checkout originates in the
        browser).

        **Rate limit:** 300 requests/hour per API key.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  minItems: 1
                  description: The variants and quantities to hold.
                  items:
                    type: object
                    required:
                      - variant_id
                      - quantity
                    properties:
                      variant_id:
                        type: string
                        format: uuid
                        description: The product variant to reserve.
                      quantity:
                        type: integer
                        minimum: 1
                        description: How many units to hold.
                ttl_seconds:
                  type: integer
                  description: |
                    Optional hold duration in seconds. Defaults to 900 (15 minutes);
                    values below 60 are raised to 60.
                  example: 900
                customer_id:
                  type: string
                  format: uuid
                  description: Optional - associate the hold with a customer (used for checkout recovery).
                session_id:
                  type: string
                  description: Optional - associate the hold with an anonymous browser session.
            example:
              items:
                - variant_id: 0d65aa5b-082a-4847-810c-38ca18e0896d
                  quantity: 2
              ttl_seconds: 900
      responses:
        '201':
          description: Stock reserved
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                type: object
                required:
                  - reservations
                  - reservation_ids
                  - expires_in_seconds
                properties:
                  reservations:
                    type: array
                    items:
                      type: object
                      properties:
                        reservation_id:
                          type: string
                          format: uuid
                        variant_id:
                          type: string
                          format: uuid
                        quantity:
                          type: integer
                  reservation_ids:
                    type: array
                    description: Pass these to order creation to convert the hold into a sale.
                    items:
                      type: string
                      format: uuid
                  expires_in_seconds:
                    type: integer
                    description: Seconds until the hold expires if not converted.
              example:
                reservations:
                  - reservation_id: 9f1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
                    variant_id: 0d65aa5b-082a-4847-810c-38ca18e0896d
                    quantity: 2
                reservation_ids:
                  - 9f1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
                expires_in_seconds: 900
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          description: Insufficient stock - nothing was reserved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: insufficient_stock
                  message: 'Insufficient stock: 1 available, 2 requested'
                  details: 'variant 0d65aa5b-082a-4847-810c-38ca18e0896d: 1 available, 2 requested'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/ServerError'
  /v1/payments/methods:
    get:
      operationId: getPaymentMethods
      tags:
        - Payments
      summary: Get available payment methods
      description: |
        Retrieve all configured payment methods for the store, including their supported currencies,
        integration types, and environment status.

        **Supported Providers:**
        - **Cash**: Manual payment method
        - **Bank Transfer**: Manual payment method
        - **Stripe**: Card payments with redirect to Stripe Checkout
        - **PayPal**: Popup checkout — the buyer approves the payment in a PayPal window
        - **Paystack**: Card payments with popup integration (Africa-focused)
        - **M-Pesa**: Mobile money STK Push (Kenya)

        **Key Type Support:**
        - ✅ Secret keys (full access)
        - ✅ Publishable keys (read-only)
      parameters:
        - name: fields
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of fields to include in the response.
              
            **Allowed Fields:**
            - `provider`, `display_name`, `type`
            - `environment`, `is_configured`
          example: provider,display_name,type
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Successfully retrieved payment methods
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                type: object
                properties:
                  methods:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentMethod'
              example:
                methods:
                  - provider: stripe
                    display_name: Stripe
                    type: redirect
                    environment: test
                    is_configured: true
                  - provider: cash
                    display_name: Cash on Delivery
                    type: manual
                    environment: production
                    is_configured: true
        '400':
          description: Invalid request (invalid field names in `fields` query parameter)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_fields:
                  summary: Invalid field names
                  value:
                    error:
                      code: invalid_request
                      message: 'Invalid field names: foo, bar'
                      details: Use ?fields=provider,display_name,type to request specific fields
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '429':
          $ref: '#/components/responses/RateLimitError'
        '500':
          $ref: '#/components/responses/ServerError'
  /v1/payments/initialize:
    post:
      operationId: initializePayment
      tags:
        - Payments
      summary: Initialize payment
      description: |
        Initialize a payment transaction with HMAC signature verification and idempotency protection.

        **🔐 HMAC Signing (REQUIRED)**
          
        All payment initialization requests MUST include HMAC-SHA256 signature:
          
        1. **Generate Timestamp**: Get current Unix timestamp in seconds
        2. **Create Payload**: Concatenate `timestamp + "." + JSON_body`
        3. **Sign Payload**: `HMAC-SHA256(hmac_secret, payload)` → base64 encode
        4. **Include Headers**:
           - `X-Timestamp`: Unix timestamp (must be within 5 minutes)
           - `X-Signature`: Base64-encoded HMAC signature
           - `Idempotency-Key`: Unique key to prevent duplicate payments

        **🔄 Idempotency Protection (REQUIRED)**
          
        Include `Idempotency-Key` header to prevent duplicate payment initialization.
        If the same key is used, the original payment initialization is returned.
          
        - Recommended format: `payment-{timestamp}-{random}`
        - Must be unique per payment attempt
        - Prevents duplicate charges on network retries
        - Returns existing payment if key already used

        **🛡️ Amount validation (anti-tampering)**

        When you pass an `order_id`, the server validates `amount` against that order's **authoritative
        total** — a `amount` that doesn't match the order total is rejected with **`400 amount_mismatch`**.
        The order total was itself validated against the catalog + the shopper's real promotions/gift card
        at order creation (see the order endpoint's server-side price validation), so you cannot charge
        less than the order is worth. Pass the order's real `total_amount`; don't compute or alter it
        client-side.

        **Provider-Specific Flows:**

        **Stripe (redirect):**
        1. Initialize payment with amount, currency, email
        2. Redirect customer to `checkout_url`
        3. Customer completes payment on Stripe
        4. Stripe redirects to success/cancel URL
        5. Verify payment status with `/v1/payments/verify`

        **PayPal (popup):**
        1. Initialize payment with amount and currency
        2. Use the returned `client_id` and `paypal_order_id` to render the PayPal Buttons popup in your frontend
        3. Customer approves the payment in the PayPal window
        4. Verify payment status with `/v1/payments/verify` — this captures the approved order

        **Paystack (popup):**
        1. Initialize payment with amount, currency, email
        2. Use returned `public_key` and `reference` to open Paystack popup
        3. Customer completes payment in popup
        4. Verify payment status with `/v1/payments/verify`

        **M-Pesa (STK Push):**
        1. Initialize payment with amount and phone (254XXXXXXXXX format)
        2. Customer receives STK Push prompt on their phone
        3. Customer enters M-Pesa PIN
        4. Verify payment status with `/v1/payments/verify`

        **Security Notes:**
        - HMAC secret is displayed in Settings → Integration Settings
        - Never expose HMAC secret in client-side code
        - Regenerate secret immediately if compromised
        - Requests with invalid/missing signatures return 401 Unauthorized
        - Timestamps older than 5 minutes are rejected (prevents replay attacks)

        **Rate Limiting:**
        - Additional 100 requests/hour limit for payment initialization
        - Separate from global API rate limits

        **Key Type Support:**
        - ✅ Secret keys (full access)
        - ❌ Publishable keys (forbidden - returns 403)
      security:
        - BearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: |
            Unique key to prevent duplicate payment initialization (e.g., payment-{timestamp}-{random}).
            If you retry a request with the same key, the original payment initialization is returned.
          schema:
            type: string
          example: payment-1771526500-abc123
        - name: X-Timestamp
          in: header
          required: true
          description: |
            Unix timestamp in seconds (current time). Must be within 5 minutes of server time.
            Used to prevent replay attacks.
          schema:
            type: integer
          example: 1771526500
        - name: X-Signature
          in: header
          required: true
          description: |
            HMAC-SHA256 signature of the payload (timestamp + "." + request_body), base64-encoded.
            Sign using your HMAC secret from Settings → Integration Settings.
          schema:
            type: string
          example: k0gb6GC6NfkrZBHamqZPAh2haiMaqm...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
                - amount
              properties:
                provider:
                  type: string
                  enum:
                    - stripe
                    - paypal
                    - paystack
                    - mpesa
                  description: Payment provider to use
                  example: stripe
                amount:
                  type: number
                  format: float
                  minimum: 0.01
                  description: Payment amount (must be greater than 0)
                  example: 100
                currency:
                  type: string
                  description: |
                    Currency code (ISO 4217). Required for Stripe and Paystack.
                    - Stripe: Defaults to store's default currency
                    - PayPal: Defaults to store's default currency
                    - Paystack: Must be one of NGN, GHS, ZAR, KES, USD
                    - M-Pesa: Always KES (ignored)
                  example: usd
                email:
                  type: string
                  format: email
                  description: Customer email (required for Stripe and Paystack)
                  example: john.doe@example.com
                phone:
                  type: string
                  description: |
                    Customer phone number (required for M-Pesa)
                    - M-Pesa: Format 254XXXXXXXXX (Kenya)
                  example: '254712345678'
                order_id:
                  type: string
                  format: uuid
                  description: Optional order ID to link payment to an order
                  example: 880e8400-e29b-41d4-a716-446655440003
                idempotency_key:
                  type: string
                  description: Optional idempotency key to prevent duplicate payments
                  example: pay-2026-02-10-abc123
                metadata:
                  type: object
                  additionalProperties:
                    type: string
                  description: Optional metadata to attach to the payment
                  example:
                    customer_name: John Doe
                    order_number: ORD-2026-001234
                success_url:
                  type: string
                  format: uri
                  description: Redirect URL after successful payment (Stripe only)
                  example: https://example.com/payment-success
                cancel_url:
                  type: string
                  format: uri
                  description: Redirect URL after cancelled payment (Stripe only)
                  example: https://example.com/payment-cancelled
                callback_url:
                  type: string
                  format: uri
                  description: Webhook callback URL (Paystack only)
                  example: https://example.com/webhooks/paystack
            examples:
              stripe:
                summary: Stripe payment
                value:
                  provider: stripe
                  amount: 100
                  currency: usd
                  email: john.doe@example.com
                  order_id: 880e8400-e29b-41d4-a716-446655440003
                  success_url: https://example.com/payment-success
                  cancel_url: https://example.com/payment-cancelled
              paypal:
                summary: PayPal payment
                value:
                  provider: paypal
                  amount: 49.99
                  currency: USD
                  order_id: 880e8400-e29b-41d4-a716-446655440003
              paystack:
                summary: Paystack payment
                value:
                  provider: paystack
                  amount: 50000
                  currency: NGN
                  email: john.doe@example.com
                  order_id: 880e8400-e29b-41d4-a716-446655440003
              mpesa:
                summary: M-Pesa payment
                value:
                  provider: mpesa
                  amount: 1000
                  phone: '254712345678'
                  order_id: 880e8400-e29b-41d4-a716-446655440003
      responses:
        '201':
          description: Payment initialized successfully
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/PaymentInitializeResponse'
                  - type: object
                    description: Paystack-specific response
                    additionalProperties: true
                    properties:
                      success:
                        type: boolean
                        example: true
                      provider:
                        type: string
                        example: paystack
                      type:
                        type: string
                        example: popup
                      reference:
                        type: string
                        example: PAY-12345678-ABC123
                      public_key:
                        type: string
                        example: pk_test_...
                      email:
                        type: string
                        example: john.doe@example.com
                      amount:
                        type: integer
                        description: Amount in kobo (smallest currency unit)
                        example: 5000000
                      currency:
                        type: string
                        example: NGN
                      environment:
                        type: string
                        example: test
                  - type: object
                    description: PayPal-specific response
                    additionalProperties: true
                    properties:
                      success:
                        type: boolean
                        example: true
                      provider:
                        type: string
                        example: paypal
                      type:
                        type: string
                        example: popup
                      order_id:
                        type: string
                        format: uuid
                        description: Galactic Core order linked to this payment, if provided
                        example: 880e8400-e29b-41d4-a716-446655440003
                      paypal_order_id:
                        type: string
                        description: PayPal order id — pass to the PayPal Buttons popup in your frontend
                        example: 5O190127TN364715T
                      client_id:
                        type: string
                        description: PayPal client id — used to load the PayPal JS SDK in your frontend
                        example: AeA1QIZXk...
                      currency:
                        type: string
                        example: USD
                      environment:
                        type: string
                        example: sandbox
                  - type: object
                    description: M-Pesa-specific response
                    additionalProperties: true
                    properties:
                      success:
                        type: boolean
                        example: true
                      provider:
                        type: string
                        example: mpesa
                      type:
                        type: string
                        example: stk_push
                      reference:
                        type: string
                        example: PAY-12345678-ABC123
                      checkout_request_id:
                        type: string
                        example: ws_CO_123456789
                      merchant_request_id:
                        type: string
                        example: 12345-67890-1
                      customer_message:
                        type: string
                        example: Success. Request accepted for processing
                      environment:
                        type: string
                        example: sandbox
              examples:
                stripe:
                  summary: Stripe response
                  value:
                    success: true
                    provider: stripe
                    type: redirect
                    reference: PAY-12345678-ABC123
                    checkout_url: https://checkout.stripe.com/c/pay/cs_test_...
                    session_id: cs_test_...
                    environment: test
                    expires_at: '2026-02-10T12:00:00Z'
                paypal:
                  summary: PayPal response
                  value:
                    provider: paypal
                    type: popup
                    order_id: 880e8400-e29b-41d4-a716-446655440003
                    paypal_order_id: 5O190127TN364715T
                    client_id: AeA1QIZXk...
                    currency: USD
                    environment: sandbox
                paystack:
                  summary: Paystack response
                  value:
                    success: true
                    provider: paystack
                    type: popup
                    reference: PAY-12345678-ABC123
                    public_key: pk_test_...
                    email: john.doe@example.com
                    amount: 5000000
                    currency: NGN
                    environment: test
                mpesa:
                  summary: M-Pesa response
                  value:
                    success: true
                    provider: mpesa
                    type: stk_push
                    reference: PAY-12345678-ABC123
                    checkout_request_id: ws_CO_123456789
                    merchant_request_id: 12345-67890-1
                    customer_message: Success. Request accepted for processing
                    environment: sandbox
        '400':
          description: Invalid request (missing required fields, invalid provider, unsupported currency, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing_fields:
                  summary: Missing required fields
                  value:
