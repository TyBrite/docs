      summary: Get product recommendations
      description: |
        AI-powered product recommendations with 5 types:
        - **similar**: Products similar to given product (embedding-based)
        - **also-bought**: Frequently purchased together (co-purchase matrix)
        - **trending**: Currently trending products (velocity-based)
        - **personalized**: Based on customer preferences
        - **bundle**: Bundle suggestions (semantic + co-purchase)
        
        **⚠️ SECRET KEY REQUIRED**
        
        This endpoint requires a secret key (tybrite_sk_*). Publishable keys will return 403 Forbidden.
        
        **Why Secret Key?** AI recommendation generation uses computational resources and accesses
        machine learning models that should be protected from unauthorized use. This prevents abuse
        and ensures fair resource allocation.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - similar
                    - also-bought
                    - trending
                    - personalized
                    - bundle
                productId:
                  type: string
                  format: uuid
                  description: Required for similar
                  also-bought: null
                  bundle: null
                customerId:
                  type: string
                  format: uuid
                  description: Required for personalized
                limit:
                  type: integer
                  default: 10
                  maximum: 50
            examples:
              similar:
                summary: Similar products
                value:
                  type: similar
                  productId: 9b2bb0c5-666d-4729-a59d-2526ec38add9
                  limit: 5
              trending:
                summary: Trending products
                value:
                  type: trending
                  limit: 10
              personalized:
                summary: Personalized recommendations
                value:
                  type: personalized
                  customerId: customer-uuid
                  limit: 10
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationResponse"
              example:
                type: similar
                recommendations:
                  - productId: d8cea277-9bb6-4942-b9e9-2f2ac351509f
                    score: 0.99
                    reason: Similar product based on description and attributes
                  - productId: 9cd6e472-de84-435c-be43-957b56682f43
