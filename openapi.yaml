  /v1/payments/initialize:
    post:
      operationId: initializePayment
      tags:
        - Payments
      summary: Initialize payment
      description: |
        Initialize a payment transaction with HMAC signature verification and idempotency protection.

        **🔐 HMAC Signing (REQUIRED)**
        
        All payment initialization requests MUST include HMAC-SHA256 signature:
        
        1. **Generate Timestamp**: Get current Unix timestamp in seconds
        2. **Create Payload**: Concatenate `timestamp + "." + JSON_body`
        3. **Sign Payload**: `HMAC-SHA256(hmac_secret, payload)` → base64 encode
        4. **Include Headers**:
           - `X-Timestamp`: Unix timestamp (must be within 5 minutes)
           - `X-Signature`: Base64-encoded HMAC signature
           - `Idempotency-Key`: Unique key to prevent duplicate payments

        **🔄 Idempotency Protection (REQUIRED)**
        
        Include `Idempotency-Key` header to prevent duplicate payment initialization.
        If the same key is used, the original payment initialization is returned.
        
        - Recommended format: `payment-{timestamp}-{random}`
        - Must be unique per payment attempt
        - Prevents duplicate charges on network retries
        - Returns existing payment if key already used

        **Provider-Specific Flows:**

        **Stripe (redirect):**
        1. Initialize payment with amount, currency, email
        2. Redirect customer to `checkout_url`
        3. Customer completes payment on Stripe
        4. Stripe redirects to success/cancel URL
        5. Verify payment status with `/v1/payments/verify`

        **Paystack (popup):**
        1. Initialize payment with amount, currency, email
        2. Use returned `public_key` and `reference` to open Paystack popup
        3. Customer completes payment in popup
        4. Verify payment status with `/v1/payments/verify`

        **M-Pesa (STK Push):**
        1. Initialize payment with amount and phone (254XXXXXXXXX format)
        2. Customer receives STK Push prompt on their phone
        3. Customer enters M-Pesa PIN
        4. Verify payment status with `/v1/payments/verify`

        **Airtel Money (Collection):**
        1. Initialize payment with amount, phone, and country code
        2. Customer receives payment prompt
        3. Customer authorizes payment
        4. Verify payment status with `/v1/payments/verify`

        **Security Notes:**
        - HMAC secret is displayed in Settings → Integration Settings
        - Never expose HMAC secret in client-side code
        - Regenerate secret immediately if compromised
        - Requests with invalid/missing signatures return 401 Unauthorized
        - Timestamps older than 5 minutes are rejected (prevents replay attacks)

        **Rate Limiting:**
        - Additional 100 requests/hour limit for payment initialization
        - Separate from global API rate limits

        **Key Type Support:**
        - ✅ Secret keys (full access)
        - ❌ Publishable keys (forbidden - returns 403)
      security:
        - BearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: |
            Unique key to prevent duplicate payment initialization (e.g., payment-{timestamp}-{random}).
            If you retry a request with the same key, the original payment initialization is returned.
          schema:
            type: string
          example: payment-1771526500-abc123
        - name: X-Timestamp
          in: header
          required: true
          description: |
            Unix timestamp in seconds (current time). Must be within 5 minutes of server time.
            Used to prevent replay attacks.
          schema:
            type: integer
          example: 1771526500
        - name: X-Signature
          in: header
          required: true
          description: |
            HMAC-SHA256 signature of the payload (timestamp + "." + request_body), base64-encoded.
            Sign using your HMAC secret from Settings → Integration Settings.
          schema:
            type: string
          example: k0gb6GC6NfkrZBHamqZPAh2haiMaqm...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
                - amount
              properties:
                provider:
                  type: string
                  enum:
                    - stripe
                    - paystack
                    - mpesa
                    - airtel
                  description: Payment provider to use
                  example: stripe
                amount:
                  type: number
                  format: float
                  minimum: 0.01
                  description: Payment amount (must be greater than 0)
                  example: 100.00
                currency:
                  type: string
                  description: |
                    Currency code (ISO 4217). Required for Stripe and Paystack.
                    - Stripe: Defaults to store's default currency
                    - Paystack: Must be one of NGN, GHS, ZAR, KES, USD
                    - M-Pesa: Always KES (ignored)
                    - Airtel: Determined by country code
                  example: usd
                email:
                  type: string
                  format: email
                  description: Customer email (required for Stripe and Paystack)
                  example: customer@example.com
                phone:
                  type: string
                  description: |
                    Customer phone number (required for M-Pesa and Airtel Money)
                    - M-Pesa: Format 254XXXXXXXXX (Kenya)
                    - Airtel: Format {country_prefix}XXXXXXXXX (e.g., 254XXXXXXXXX for Kenya)
                  example: "254712345678"
                country:
                  type: string
                  description: |
                    Country code for Airtel Money (required for Airtel)
                    Supported: KE (Kenya), UG (Uganda), TZ (Tanzania), RW (Rwanda)
                  example: KE
                order_id:
                  type: string
                  format: uuid
                  description: Optional order ID to link payment to an order
                  example: 880e8400-e29b-41d4-a716-446655440003
                idempotency_key:
                  type: string
                  description: Optional idempotency key to prevent duplicate payments
                  example: pay-2026-02-10-abc123
                metadata:
                  type: object
                  additionalProperties:
                    type: string
                  description: Optional metadata to attach to the payment
                  example:
                    customer_name: John Doe
                    order_number: ORD-2026-001234
                success_url:
                  type: string
                  format: uri
                  description: Redirect URL after successful payment (Stripe only)
                  example: https://example.com/payment-success
                cancel_url:
                  type: string
                  format: uri
                  description: Redirect URL after cancelled payment (Stripe only)
                  example: https://example.com/payment-cancelled
                callback_url:
                  type: string
                  format: uri
                  description: Webhook callback URL (Paystack only)
                  example: https://example.com/webhooks/paystack
            examples:
              stripe:
                summary: Stripe payment
                value:
                  provider: stripe
                  amount: 100.00
                  currency: usd
                  email: customer@example.com
                  order_id: 880e8400-e29b-41d4-a716-446655440003
                  success_url: https://example.com/payment-success
                  cancel_url: https://example.com/payment-cancelled
              paystack:
                summary: Paystack payment
                value:
                  provider: paystack
                  amount: 50000
                  currency: NGN
                  email: customer@example.com
                  order_id: 880e8400-e29b-41d4-a716-446655440003
              mpesa:
                summary: M-Pesa payment
                value:
                  provider: mpesa
                  amount: 1000
                  phone: "254712345678"
                  order_id: 880e8400-e29b-41d4-a716-446655440003
              airtel:
                summary: Airtel Money payment
                value:
                  provider: airtel
                  amount: 1000
                  phone: "254712345678"
                  country: KE
                  order_id: 880e8400-e29b-41d4-a716-446655440003
      responses:
        "200":
          description: Payment initialized successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PaymentInitializeResponse"
                  - type: object
                    description: Paystack-specific response
                    properties:
                      success:
                        type: boolean
                        example: true
                      provider:
                        type: string
                        example: paystack
                      type:
                        type: string
                        example: popup
                      reference:
                        type: string
                        example: PAY-12345678-ABC123
                      public_key:
                        type: string
                        example: pk_test_...
                      email:
                        type: string
                        example: customer@example.com
                      amount:
                        type: integer
                        description: Amount in kobo (smallest currency unit)
                        example: 5000000
                      currency:
                        type: string
                        example: NGN
                      environment:
                        type: string
                        example: test
                  - type: object
                    description: M-Pesa/Airtel Money-specific response
                    properties:
                      success:
                        type: boolean
                        example: true
                      provider:
                        type: string
                        example: mpesa
                      type:
                        type: string
                        example: stk_push
                      reference:
                        type: string
                        example: PAY-12345678-ABC123
                      checkout_request_id:
                        type: string
                        example: ws_CO_123456789
                      merchant_request_id:
                        type: string
                        example: 12345-67890-1
                      customer_message:
                        type: string
                        example: Success. Request accepted for processing
                      environment:
                        type: string
                        example: sandbox
              examples:
                stripe:
                  summary: Stripe response
                  value:
                    success: true
                    provider: stripe
                    type: redirect
                    reference: PAY-12345678-ABC123
                    checkout_url: https://checkout.stripe.com/c/pay/cs_test_...
                    session_id: cs_test_...
                    environment: test
                    expires_at: "2026-02-10T12:00:00Z"
                paystack:
                  summary: Paystack response
                  value:
                    success: true
                    provider: paystack
                    type: popup
                    reference: PAY-12345678-ABC123
                    public_key: pk_test_...
                    email: customer@example.com
                    amount: 5000000
                    currency: NGN
                    environment: test
                mpesa:
                  summary: M-Pesa response
                  value:
                    success: true
                    provider: mpesa
                    type: stk_push
                    reference: PAY-12345678-ABC123
                    checkout_request_id: ws_CO_123456789
                    merchant_request_id: 12345-67890-1
                    customer_message: Success. Request accepted for processing
                    environment: sandbox
        "400":
          description: Invalid request (missing required fields, invalid provider, unsupported currency, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missing_fields:
                  summary: Missing required fields
                  value:
                    error:
                      code: invalid_request
                      message: provider and amount are required
                invalid_amount:
                  summary: Invalid amount
                  value:
                    error:
                      code: invalid_request
                      message: amount must be greater than 0
                unsupported_provider:
                  summary: Unsupported provider
                  value:
                    error:
                      code: invalid_request
                      message: "Unsupported provider: unknown_provider"
                provider_not_configured:
                  summary: Provider not configured
                  value:
                    error:
                      code: provider_not_configured
                      message: Stripe not configured for this store
                invalid_phone:
                  summary: Invalid phone format
                  value:
                    error:
                      code: invalid_request
                      message: "Invalid phone number format. Use 254XXXXXXXXX"
                unsupported_currency:
                  summary: Unsupported currency
                  value:
                    error:
                      code: invalid_request
                      message: "Unsupported currency: EUR. Supported: NGN, GHS, ZAR, KES, USD"
                missing_idempotency_key:
                  summary: Missing Idempotency-Key header
                  value:
                    error:
                      code: missing_idempotency_key
                      message: Idempotency-Key header required for payment initialization
                      hint: Include a unique Idempotency-Key header to prevent duplicate payments
        "401":
          description: Unauthorized - Invalid or missing authentication credentials, or HMAC signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalid_api_key:
                  summary: Invalid API key
                  value:
                    error:
                      code: unauthorized
                      message: Invalid API key
                missing_api_key:
                  summary: Missing API key
                  value:
                    error:
                      code: unauthorized
                      message: Missing authorization header
                invalid_hmac_signature:
                  summary: Invalid HMAC signature
                  value:
                    error:
                      code: invalid_signature
                      message: Request signature verification failed
                missing_timestamp:
                  summary: Missing X-Timestamp header
                  value:
                    error:
                      code: invalid_signature
                      message: Request signature verification failed
                expired_timestamp:
                  summary: Expired timestamp (>5 minutes old)
                  value:
                    error:
                      code: invalid_signature
                      message: Request signature verification failed
                wrong_hmac_secret:
                  summary: Wrong HMAC secret used
                  value:
                    error:
                      code: invalid_signature
                      message: Request signature verification failed
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"
  /v1/payments/verify:
    post:
      operationId: verifyPayment
      tags:
        - Payments
      summary: Verify payment status
      description: |
        Verify the status of a payment transaction using the payment reference.
        This endpoint queries the payment provider's API to get the current status.
        
        **⚠️ SECRET KEY REQUIRED**
        
        This endpoint requires a secret key (tybrite_sk_*). Publishable keys will return 403 Forbidden.
        
        **Why Secret Key?** Payment verification accesses sensitive transaction data and provider APIs
        that should only be called from secure server-side environments. This prevents unauthorized
        access to payment status information.

        **Provider-Specific Verification:**

        **Stripe:**
        - Queries Stripe Checkout Session API
        - Returns payment status: `pending`, `paid`, `failed`, `cancelled`
        - Includes payment intent details

        **Paystack:**
        - Queries Paystack Transaction Verification API
        - Returns payment status and transaction details
        - Includes gateway response and fees

        **M-Pesa:**
        - Queries M-Pesa STK Push Query API
        - Returns transaction status from Safaricom
        - Includes M-Pesa receipt number if successful

        **Airtel Money:**
        - Queries Airtel Money Transaction Status API
        - Returns transaction status and details
        - Includes Airtel transaction ID if successful

        **Note:** Despite using POST method (for request body), this is a read operation that
        queries external payment provider APIs.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
                - reference
              properties:
                provider:
                  type: string
                  enum:
                    - stripe
                    - paystack
                    - mpesa
                    - airtel
                  description: Payment provider used for initialization
                  example: stripe
                reference:
                  type: string
                  description: Payment reference returned from initialization
                  example: PAY-12345678-ABC123
            examples:
              stripe:
                summary: Verify Stripe payment
                value:
                  provider: stripe
                  reference: PAY-12345678-ABC123
              paystack:
                summary: Verify Paystack payment
                value:
                  provider: paystack
                  reference: PAY-12345678-ABC123
              mpesa:
                summary: Verify M-Pesa payment
                value:
                  provider: mpesa
                  reference: PAY-12345678-ABC123
      responses:
        "200":
          description: Payment verification successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  provider:
                    type: string
                    example: stripe
                  reference:
                    type: string
                    example: PAY-12345678-ABC123
                  status:
                    type: string
                    enum:
                      - pending
                      - paid
                      - failed
                      - cancelled
                    example: paid
                  amount:
                    type: number
                    format: float
                    example: 100.00
                  currency:
                    type: string
                    example: usd
                  payment_method:
                    type: string
                    example: card
                  provider_reference:
                    type: string
                    description: Provider-specific transaction ID
                    example: pi_3ABC123...
                  paid_at:
                    type: string
                    format: date-time
                    nullable: true
                    example: "2026-02-10T10:30:00Z"
                  metadata:
                    type: object
                    additionalProperties: true
                    description: Provider-specific metadata
              examples:
                stripe_paid:
                  summary: Stripe payment successful
                  value:
                    success: true
                    provider: stripe
                    reference: PAY-12345678-ABC123
                    status: paid
                    amount: 100.00
                    currency: usd
                    payment_method: card
                    provider_reference: pi_3ABC123...
                    paid_at: "2026-02-10T10:30:00Z"
                paystack_paid:
                  summary: Paystack payment successful
                  value:
                    success: true
                    provider: paystack
                    reference: PAY-12345678-ABC123
                    status: paid
                    amount: 50000
                    currency: NGN
                    payment_method: card
                    provider_reference: "1234567890"
                    paid_at: "2026-02-10T10:30:00Z"
                mpesa_paid:
                  summary: M-Pesa payment successful
                  value:
                    success: true
                    provider: mpesa
                    reference: PAY-12345678-ABC123
                    status: paid
                    amount: 1000
                    currency: KES
                    payment_method: mpesa
                    provider_reference: QAB1CD2EFG
                    paid_at: "2026-02-10T10:30:00Z"
