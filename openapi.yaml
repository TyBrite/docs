                    updated_at: '2026-06-20T10:12:03.673701+00:00'
                multi_variant_product_full:
                  summary: Multi-variant product (full response)
                  description: Hierarchical structure with product-level data at root, an aggregate price_range, and a clean variants array. Each variant has its own selling_price and stock.
                  value:
