                    threshold: 5
                  - sku: SAMPLE-TEE-BLK-M
                    product_group: SAMPLE-TEE
                    name: Classic Cotton Tee
                    variant_name: Black / M
                    category: Apparel
                    brand: Northwind
                    price: 22
                    cost_price: 8.4
                    stock: 25
                    threshold: 5
            text/csv:
              schema:
                type: string
              example: |
                sku,product_group,name,description,category,brand,variant_name,price,cost_price,stock,threshold,barcode,barcode_type
                SAMPLE-LAMP-01,,Aurora LED Desk Lamp,Dimmable desk lamp with USB-C.,Home,Lumio,,36.9,17.2,40,5,0850000100017,EAN13
                SAMPLE-TEE-BLK-S,SAMPLE-TEE,Classic Cotton Tee,,Apparel,Northwind,Black / S,22,8.4,30,5,,
                SAMPLE-TEE-BLK-M,SAMPLE-TEE,Classic Cotton Tee,,Apparel,Northwind,Black / M,22,8.4,25,5,,
            application/xml:
              schema:
                type: string
        '429':
          $ref: '#/components/responses/RateLimitError'
  /v1/ingest/test:
    post:
      operationId: testIngest
      tags:
        - Ingestion
      summary: Validate a product feed (no writes)
      description: |
        Parse and validate a product feed **without writing anything** to your store, and get
        back the same `summary` and `errors` you would receive from a real import — plus a
        `normalized_preview` of how Galactic Core interpreted your rows. **No API key
        required**, so you can perfect your feed format before integrating. Accepts JSON, XML,
        or CSV like the real endpoint. Rate-limited to 60 requests/hour per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                products:
                  type: array
                  items:
                    $ref: '#/components/schemas/IngestProduct'
          text/csv:
            schema:
              type: string
          application/xml:
            schema:
              type: string
      responses:
        '200':
          description: |
            Validation result. `status` is `valid` (no failures), `partial` (some rows failed),
            or `invalid` (all rows failed).
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - valid
                      - partial
                      - invalid
                  format:
                    type: string
                  validate_only:
                    type: boolean
                  summary:
                    $ref: '#/components/schemas/IngestSummary'
                  errors:
                    type: array
                    items:
                      $ref: '#/components/schemas/IngestRowError'
                  normalized_preview:
                    type: array
                    items:
                      $ref: '#/components/schemas/IngestProduct'
              example:
                status: partial
                format: json
                validate_only: true
                summary:
                  rows_total: 2
                  rows_created: 1
                  rows_updated: 0
                  rows_skipped: 0
                  rows_failed: 1
                errors:
                  - row: 2
                    sku: DEMO-BAD
                    field: price
                    reason: price must be a positive number
                normalized_preview:
                  - sku: DEMO-1
                    name: Demo Widget
                    category: General
                    price: 19.99
                    stock: 10
                  - sku: DEMO-BAD
                    name: No Price
                    category: General
                    price: -5
                    stock: 3
        '400':
          $ref: '#/components/responses/BadRequestError'
        '429':
          $ref: '#/components/responses/RateLimitError'
  /v1/feeds/{store}/products.json:
    get:
      operationId: getStoreCatalogFeedJson
      tags:
        - Ingestion
      summary: Public catalog feed (JSON)
      description: |
        Returns a store's catalog as a public JSON feed — **no API key required**. This is the
        outbound counterpart to ingestion: a store opts in (admin → Catalog Sync → "Publish my
        catalog") and its products become readable at a stable URL, so any system can pull them
        (another store's scheduled sync, a partner, a script). Only storefront-safe fields are
        exposed — never cost or margins.

        `{store}` is the store's id or its short store code. If the store set a private token,
        append `?token=…`. The feed shape matches what the ingestion endpoints accept, so a
        store-to-store sync is a direct pull-and-ingest with no field mapping.
      parameters:
        - name: store
          in: path
          required: true
          schema:
            type: string
          description: The store's id or short store code.
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: Required only if the store protected its feed with a token.
      responses:
        '200':
          description: The store's catalog.
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/FeedProduct'
              example:
                products:
                  - sku: ELEC-ACTIONCAM-01-de4a
                    name: 4K Action Camera
                    description: Waterproof 4K action camera with image stabilization and dual screens.
                    category: Cameras & Photography
                    subcategory: null
                    brand: Pulsewave
                    image: https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f?w=400
                    media: []
                    price: 149
                    sale_price: 129
                    stock: 148
                    seo_title: 4K Action Camera Waterproof Image Stabilization
                    seo_description: Waterproof 4K action camera with dual screens and advanced image stabilization for adventure sports.
                    seo_keywords:
                      - 4k action camera
                      - waterproof camera
                      - image stabilization
                  - sku: API-CHARGER-01-afbf
                    name: 65W USB-C GaN Charger
                    description: Compact 65W USB-C GaN wall charger with foldable prongs.
                    category: Accessories & Cables
                    subcategory: Charging & Power
                    brand: Pulsewave
                    image: https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400
                    media: []
                    price: 39.99
                    sale_price: null
                    stock: 69
                    seo_title: 65W USB-C GaN Charger Compact Fast Charging
                    seo_description: Compact 65W USB-C GaN wall charger with foldable prongs for fast, portable charging.
                    seo_keywords:
                      - 65w usb-c charger
                      - gan charger
        '404':
          description: The store has no public feed (not opted in, or wrong/missing token).
        '429':
          $ref: '#/components/responses/RateLimitError'
  /v1/feeds/{store}/products.xml:
    get:
      operationId: getStoreCatalogFeedXml
