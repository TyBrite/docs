  /v1/auth/register:
    post:
      operationId: register
      tags:
        - Authentication
      summary: Register customer account
      description: |
        Create a new customer account with email and password.
        Returns user details and authentication tokens upon successful registration.
        
        **⚠️ SECRET KEY REQUIRED**
        
        This endpoint requires a secret key (tybrite_sk_*). Publishable keys will return 403 Forbidden.
        
        **Why Secret Key?** Authentication endpoints create and manage user sessions, which should
        only be performed from secure server-side environments.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  description: Customer email address
                  example: jane.doe@example.com
                password:
                  type: string
                  minLength: 8
                  description: Password (minimum 8 characters)
                  example: SecurePassword123!
                name:
                  type: string
                  description: Customer full name
                  example: Jane Doe
                phone:
                  type: string
                  description: Phone number with country code
                  example: "+1234567890"
            example:
              email: jane.doe@example.com
              password: SecurePassword123!
              name: Jane Doe
              phone: "+1234567890"
      responses:
        "200":
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  customer:
                    $ref: "#/components/schemas/Customer"
                  session:
                    $ref: "#/components/schemas/Session"
        "400":
          description: Invalid request (email already exists, weak password, etc.)
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/ServerError"
  /v1/auth/login:
    post:
      operationId: login
      tags:
