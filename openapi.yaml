tags:
  - name: System
    description: API information and health checks
  - name: Authentication
    description: |
      Customer authentication and session management.
        
      **⚠️ SECRET KEY REQUIRED**: All authentication endpoints require a secret key (tybrite_sk_*).
      Publishable keys will return 403 Forbidden.
        
      These endpoints manage customer accounts, login sessions, password resets, and OTP verification.
      Use these to build customer-facing authentication flows in your storefront.
        
      **Special Headers:**
      - `x-auth-token`: Required for `GET /v1/auth/me` and `POST /v1/auth/update-password`
      - Contains the authentication token from login/register response
      - Token expires after session timeout (default 1 hour)
        
      **Rate Limiting:**
      - All authentication endpoints: 10 requests/minute per IP address
      - Prevents brute force attacks on customer accounts
  - name: Products
    description: Product catalog management
  - name: Orders
    description: |
      Order lifecycle management with automatic inventory sync and accounting.
        
      **Special Headers:**
      - `Idempotency-Key`: **REQUIRED** for `POST /v1/orders` and `PATCH /v1/orders/:id`
        - Prevents duplicate order creation and duplicate update processing on network retries
        - Recommended formats:
          - Order creation: `order-{date}-{unique-id}`
          - Order updates: `update-{operation}-{order_id}-{timestamp}`
        - Stored for 24 hours
        - Retrying with same key returns existing order/state (not counted against rate limit)
      - `X-Timestamp`: **REQUIRED** for `POST /v1/orders` and `PATCH /v1/orders/:id`
        - Unix timestamp in seconds (current time)
        - Must be within 5 minutes of server time
        - Used to prevent replay attacks
      - `X-Signature`: **REQUIRED** for `POST /v1/orders` and `PATCH /v1/orders/:id`
        - HMAC-SHA256 signature of payload (timestamp + "." + request_body), base64-encoded
        - Sign using your HMAC secret from Settings → Integration Settings
        - Requests with invalid/missing signatures return 401 Unauthorized
        
      **Automatic Processing:**
      - Inventory automatically decremented when payment_status changes to 'paid'
      - Double-entry accounting journal entries created automatically
      - Payment status tracked and updated via webhooks
      - Gift card redemptions and promotion usage tracked with idempotency protection
  - name: Customers
    description: Customer profile management
  - name: Cart & Wishlist
    description: |
      Shopping cart and wishlist operations with anonymous session support.
        
      **Special Headers:**
      - `X-Session-Id`: Optional header for anonymous cart functionality
      - Generate a unique session ID on the client (UUID or random string)
      - Store in localStorage/sessionStorage for persistence
      - When customer logs in, migrate cart by providing `customer_id` instead
        
      **Cart Association:**
      - If `X-Session-Id` provided: Cart associated with session (anonymous)
      - If `customer_id` provided: Cart associated with customer account
      - If both provided: `customer_id` takes precedence
      - If neither provided: Returns 400 error
        
      **Use Cases:**
      - Anonymous browsing: Use `X-Session-Id` before customer authentication
      - Logged-in customers: Use `customer_id` parameter
      - Cart migration: Switch from session to customer_id after login
  - name: Search
    description: |
      Semantic search with AI embeddings and simple text search.
        
      **Key Type Support:**
      - `GET /v1/search` (simple text search): Both secret and publishable keys allowed
      - `POST /v1/search` (semantic search): Both secret and publishable keys allowed
        
      Note: Despite using POST method, semantic search is a read-only operation and works
      with publishable keys. The POST method is used to support complex request bodies.
  - name: Recommendations
    description: |
      AI-powered product recommendations using semantic embeddings and collaborative filtering.
        
      **⚠️ SECRET KEY REQUIRED**: Recommendation generation requires a secret key (tybrite_sk_*).
      Publishable keys will return 403 Forbidden.
        
      This restriction protects the computational resources and AI model access used for
      generating personalized recommendations.
  - name: Events
    description: |
      Storefront interaction events (product views, add-to-cart, add-to-wishlist). These power the
      `next` recommendation type — the products a shopper is most likely to view or add next based
      on their current session. Publishable keys are accepted so events can be sent from the browser.
  - name: Analytics
    description: |
      First-party storefront analytics capture. Fire a lightweight page-view / session-start event
      from the storefront on each route change; device, browser, and approximate location are derived
      automatically from the request. These events power the merchant's Store Analytics dashboard
      (traffic, audience, conversion funnel, and revenue-by-source). Publishable keys are accepted so
      events can be sent directly from the browser.
  - name: Taxonomy
    description: Categories and subcategories
  - name: CMS
    description: Content management (posts, lookbooks)
  - name: Payments
    description: |
      Multi-provider payment processing (Stripe, PayPal, Paystack, M-Pesa).
        
      **Special Headers:**
      - `Idempotency-Key`: **REQUIRED** for `POST /v1/payments/initialize`
        - Unique key to prevent duplicate payment initialization (e.g., payment-{timestamp}-{random})
        - If you retry with the same key, the original payment initialization is returned
        - Prevents duplicate charges on network retries
      - `X-Timestamp`: **REQUIRED** for `POST /v1/payments/initialize`
        - Unix timestamp in seconds (current time)
        - Must be within 5 minutes of server time
        - Used to prevent replay attacks
      - `X-Signature`: **REQUIRED** for `POST /v1/payments/initialize`
        - HMAC-SHA256 signature of payload (timestamp + "." + request_body), base64-encoded
        - Sign using your HMAC secret from Settings → Integration Settings
        - Requests with invalid/missing signatures return 401 Unauthorized
        
      **Key Type Requirements:**
      - `GET /v1/payments/methods`: Both secret and publishable keys allowed
      - `POST /v1/payments/initialize`: Secret key required
      - `POST /v1/payments/verify`: **SECRET KEY REQUIRED** (read operation but sensitive)
        
      Payment verification requires a secret key because it accesses sensitive payment status
      information that should not be exposed to client-side code.
        
      **Rate Limiting:**
      - Payment initialization has an additional rate limit of 100 requests/hour per API key
      - This is on top of the global rate limits (1,000/hour for publishable keys, 10,000/hour for secret keys)
      - Prevents payment spam and fraud attempts
  - name: Shipping
    description: Shipping zones and delivery cost calculation
  - name: Pricing
    description: Dynamic pricing engine
  - name: Promotions
    description: Marketing promotions and discounts
  - name: Gift Cards
    description: Gift card management
  - name: Messaging
    description: Real-time customer support messaging
  - name: GC Connect
    description: |
      Hosted authorization flow for connecting third-party tools to a merchant's store.

      **Connect your GC Store** lets developers build integrations where merchants
      authorize access with a single click — no API key copying required. The result
      is a permanent key pair scoped to the merchant's store and the permissions they
      granted.

      **Flow overview:**
      1. Redirect the merchant to the consent page with your `client_id`, `redirect_uri`,
         `scope`, and `state`.
      2. The merchant logs in (if not already) and approves the connection.
      3. Galactic Core redirects back to your `redirect_uri` with a short-lived `code`.
      4. Your **server** calls `POST /v1/connect/token` to exchange the code for `sk` + `pk`.
      5. Store the `sk` securely server-side. Use it for all subsequent API calls on behalf
         of the merchant.

      **Keys are permanent** — they remain active until the merchant disconnects your
      application from their Settings panel, or you call `POST /v1/connect/revoke`.

      **To integrate**, your application must be approved by Galactic Core. Apply via the
      [Developer Portal](https://gc.tybritelabs.com/developers).
  - name: Reviews
    description: |
      Product reviews and ratings submitted by customers, moderated by merchants.

      **Key type behavior:**
      - Publishable keys (`tybrite_pk_*`) — list and get approved reviews, submit reviews
        (requires an additional customer session token), and mark reviews helpful.
      - Secret keys (`tybrite_sk_*`) — all of the above, plus view pending/rejected reviews,
        approve or reject submissions, and delete any review.

      **Review lifecycle:**
      1. A logged-in customer submits a review (`POST /v1/reviews`). It starts as `pending`.
      2. The merchant reviews pending submissions in their dashboard and calls
         `PATCH /v1/reviews/{id}` to approve or reject.
      3. Once approved, the review appears in public listing results.

      **Verified purchases:** Supply the `order_id` when submitting. If the order belongs to
      the authenticated customer, the review is automatically marked `verified_purchase: true`.

      **Duplicate prevention:** A customer may only have one non-rejected review per product.
      A second submission returns `409 Conflict`.

      **Special headers:**
      - `x-auth-token`: Customer session JWT — required for `POST /v1/reviews` (submit)
        and for `DELETE /v1/reviews/{id}` when using a publishable key to delete own review.
        Obtained from `POST /v1/auth/login` or `POST /v1/auth/verify-otp`.
  - name: Returns
    description: |
      Return requests a shopper lodges against their own online orders.

      **Key type behavior:**
      - The reason-code list (`GET /v1/returns/reasons`) needs only an API key — no
        customer session — so you can build the reason picker before sign-in.
      - Listing, getting, and creating returns require an API key **and** a customer
        session: either `x-auth-token` (a GC-native session token) or
        `x-external-auth` (a bring-your-own-auth assertion).

      A customer can only create, list, and track their OWN returns. Approving,
      processing refunds or store credit, restocking, and rejecting items are
      store-management tasks handled in the merchant admin, not through this API.

      **Special headers:**
      - `x-auth-token` **or** `x-external-auth`: identifies the signed-in customer on
        `GET /v1/returns`, `GET /v1/returns/{id}`, and `POST /v1/returns`.
  - name: Marketplace
    description: |
      Endpoints for building a multi-merchant marketplace storefront.

      These endpoints let a marketplace storefront read the marketplace's identity and
      branding (and a single merchant's store information within it), resolve commission,
      check out a cart spanning multiple merchants in a single payment, and read a
      shopper's unified profile across every merchant they have shopped with.

      To narrow aggregated marketplace catalog results to a single merchant's "shop page",
      pass `?store_id=<merchant>` to the products, categories, subcategories, and search
      endpoints (operator key only).

      **Key types:**
      - Marketplace information, unified checkout, and the unified customer profile use
        the marketplace operator key. Commission resolution accepts the marketplace operator
        key or a merchant secret key.

      Merchant payment onboarding and operator payout runs are merchant/operator back-office
      tasks handled in the admin interface, not through this API.
  - name: Ingestion
    description: |
      Sync an external product catalog INTO Galactic Core.

      **⚠️ SECRET KEY + SIGNATURE REQUIRED**: `POST /v1/ingest/products` requires a secret
      key (`tybrite_sk_*`) **and** a request signature. Publishable keys return 403; a missing
      or invalid signature returns 401. This is the one write endpoint where both are mandatory.

      Use ingestion when a merchant's own system (an ERP, a PIM, another storefront, a
      spreadsheet export) is the source of truth for products and you want to push or sync
      that catalog into Galactic Core — rather than entering products by hand.

      **What it does:**
      - Accepts a batch of products as **JSON, XML, or CSV** (set the `Content-Type`, or
        `?format=`). One request can carry many products.
      - **Upserts by SKU**: a product whose SKU already exists is updated; a new SKU is created.
        Use `?strategy=create_only` to skip existing SKUs instead of updating them.
      - **Groups variants**: rows that share a `product_group` become variants of a single
        product (e.g. a shirt in S/M/L). Rows without a group are single-variant products.
      - **Reports per row**: the response carries a `summary` (created / updated / skipped /
        failed counts) and an `errors` array naming the row, SKU, field, and reason for every
        rejected row — so a partly-valid batch still imports the good rows and tells you exactly
        what to fix.

      **Signing:** sign each request the same way as orders/payments — `X-Timestamp` (unix
      seconds) + `X-Signature` (HMAC-SHA256 of `timestamp + "." + raw_body`, base64), within a
      5-minute window. An `Idempotency-Key` is required so a retried batch is processed once.

      **Test before you integrate (no key needed):**
      - `GET /v1/ingest/sample?format=json|xml|csv` returns a valid sample feed to copy.
      - `POST /v1/ingest/test` validates a feed and returns the same `summary`/`errors` you'd
        get from a real import — **without writing anything**. Both are rate-limited to 60/hour
        per IP.

      **Scheduled sync:** merchants can also register a feed URL in their dashboard for Galactic
      Core to pull and sync on a schedule; a `feed.sync.completed` webhook fires after each run.
  - name: Webhooks
    description: |
      Outbound webhook management for merchant integrators.

      **⚠️ SECRET KEY REQUIRED**: All webhook endpoints require a secret key (`tybrite_sk_*`).
      Publishable keys will return 403 Forbidden.

      Webhooks allow your systems to receive real-time notifications when events occur in your
      store — eliminating the need to poll the API.

      **Delivery contract:**
      - **At-least-once** delivery — endpoints must be idempotent. Use `event.id` for dedup.
      - **HMAC-signed** — every request carries `X-Tybrite-Signature: t=<timestamp>,v1=<hmac_sha256>`.
        Verify with the `signing_secret` returned at endpoint creation.
      - **Payload size** — capped at 256 KB per delivery.
      - **Ordering** — best-effort, not guaranteed. Use event timestamps for sequencing.

      **Signature verification:**
      ```typescript
      const [tPart, v1Part] = req.headers['x-tybrite-signature'].split(',');
      const timestamp = tPart.replace('t=', '');
      const receivedSig = v1Part.replace('v1=', '');
      const payload = `${timestamp}.${rawBody}`;
      const expected = hmacSha256Hex(signingSecret, payload);
      if (receivedSig !== expected) throw new Error('Invalid signature');
      // Replay check: reject if |now - timestamp| > 300 seconds
      ```

      **Rate Limiting:** 500 requests/hour per secret key.
