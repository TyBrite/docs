    CustomerAddress:
      type: object
      description: |
        A saved address in a shopper's personal address book. Shoppers can store
        multiple billing and shipping addresses and reuse them at checkout.
      properties:
        id:
          type: string
          format: uuid
          example: 9b1c6f0e-3a2d-4f7b-8c11-2d4e5f6a7b8c
        customer_id:
          type: string
          format: uuid
          example: 6f3d8a21-4b9c-4e2a-9f1d-7c2b3a4d5e6f
        address_type:
          type: string
          enum:
            - shipping
            - billing
            - both
          default: both
          description: Whether this address is usable for shipping, billing, or both.
          example: both
        label:
          type:
            - string
            - 'null'
          description: An optional friendly name for the address, e.g. "Home" or "Office".
          example: Home
        full_name:
          type: string
          example: Jane Doe
        phone:
          type:
            - string
            - 'null'
          example: '+14155551234'
        line1:
          type: string
          example: 123 Main St
        line2:
          type:
            - string
            - 'null'
          example: Apt 4B
        city:
          type: string
          example: New York
        state:
          type:
            - string
            - 'null'
          example: NY
        postal_code:
          type:
            - string
            - 'null'
          example: '10001'
        country:
          type: string
          example: US
        is_default_shipping:
          type: boolean
          description: When true, this is the default address pre-selected for shipping at checkout.
          example: true
        is_default_billing:
          type: boolean
          description: When true, this is the default address pre-selected for billing at checkout.
          example: false
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GiftCard:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique gift card identifier.
        code:
          type: string
          description: The unique redeemable code.
        value:
          type: number
          description: The original face value the gift card was issued with.
        balance:
          type: number
          description: Remaining redeemable balance.
        status:
          type: string
          description: Lifecycle status. A gift card is only redeemable while `active`.
          example: active
        type:
          type: string
          description: Gift card type (e.g. `promotional`, `purchased`).
        expiry_date:
          type:
            - string
            - 'null'
          format: date
          description: Date the gift card expires (null if it never expires). It is not redeemable on or after this date.
        customer_id:
          type:
            - string
            - 'null'
          format: uuid
          description: Customer the gift card is assigned to, if any.
        issued_to:
          type:
            - string
            - 'null'
          description: Free-text recipient the card was issued to (e.g. an email or name), if any.
        issued_date:
          type: string
          format: date
        last_used:
          type:
            - string
            - 'null'
          format: date
          description: Date the gift card was last redeemed, or `null` if never used.
        minimum_purchase_amount:
          type:
            - number
            - 'null'
          description: Minimum order total required before this gift card can be applied.
        maximum_usage_percentage:
          type:
            - number
            - 'null'
          description: Maximum percentage of the balance that may be applied to a single order.
        usage_restrictions:
          type: object
          description: Optional restrictions on where the card can be applied (e.g. excluded categories or products).
        redemption_count:
          type: integer
          description: Number of times the gift card has been redeemed.
        max_redemptions:
          type:
            - integer
            - 'null'
          description: Maximum number of redemptions allowed, or `null` for unlimited.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ResolvedPromotionProduct:
      type: object
      description: |
        A promotion product entry with its details embedded. Returned inside the
        `*_resolved` arrays when a promotion is fetched with `expand=products`.
      properties:
        productId:
          type: string
          format: uuid
          description: The product this entry refers to.
        quantity:
          type: number
          description: Quantity of this product the promotion entry covers.
        product:
          type:
            - object
            - 'null'
          description: |
            The resolved product details, or `null` if the product is unavailable
            (for example, it has been removed from the catalog).
          properties:
            product_id:
              type: string
              format: uuid
            name:
              type: string
            price:
              type: number
            image:
              type:
                - string
                - 'null'
              format: uri
            category:
              type:
                - string
                - 'null'
    Promotion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          description: Promotion mechanic.
          enum:
            - fixed
            - discount
            - bundle
            - bogo
        display_type:
          type: string
          description: Human-readable label derived from `type` (e.g. "Percentage Discount").
        value:
          type: string
          description: The discount amount or percentage for this promotion, depending on `type`.
        min_purchase:
          type:
            - number
            - 'null'
          description: Minimum order total required for the promotion to apply.
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          description: Lifecycle status. Only `active` promotions (within their date window) apply.
          example: active
        conditions:
          type:
            - string
            - 'null'
          description: Optional human-readable conditions for the promotion.
        image:
          type:
            - string
            - 'null'
          format: uri
          description: URL of the promotion image.
        bundle_products:
          type: array
          description: Products that make up a bundle promotion (present for `bundle` type).
          items:
            type: object
        bogo_required_products:
          type: array
          description: Products that must be purchased to unlock a BOGO promotion (present for `bogo` type).
          items:
            type: object
        bogo_free_products:
          type: array
          description: Products given free under a BOGO promotion (present for `bogo` type).
          items:
            type: object
        bundle_products_resolved:
          type: array
          description: |
            Present only when the promotion is fetched with `expand=products`. The same
            entries as `bundle_products`, each enriched with an embedded `product` object
            so you can render the bundle without a second lookup.
          items:
            $ref: '#/components/schemas/ResolvedPromotionProduct'
        bogo_required_products_resolved:
          type: array
          description: |
            Present only when the promotion is fetched with `expand=products`. The same
            entries as `bogo_required_products`, each enriched with an embedded `product`
            object.
          items:
            $ref: '#/components/schemas/ResolvedPromotionProduct'
        bogo_free_products_resolved:
          type: array
          description: |
            Present only when the promotion is fetched with `expand=products`. The same
            entries as `bogo_free_products`, each enriched with an embedded `product`
            object.
          items:
            $ref: '#/components/schemas/ResolvedPromotionProduct'
        has_time_restrictions:
          type: boolean
          description: Whether the promotion only applies during specific times/days.
        start_time:
          type:
            - string
            - 'null'
          description: Daily start time (when `has_time_restrictions` is true).
        end_time:
          type:
            - string
            - 'null'
          description: Daily end time (when `has_time_restrictions` is true).
        time_zone:
          type:
            - string
            - 'null'
          description: Time zone the time restrictions are evaluated in.
        apply_to_days:
          type:
            - array
            - 'null'
          description: Days of the week the promotion applies to (when `has_time_restrictions` is true).
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PromotionCartItem:
      type: object
      required:
        - product_id
        - quantity
        - price
      description: A single line item in the cart you want a discount calculated for.
      properties:
        product_id:
          type: string
          format: uuid
          description: The product in this cart line.
        quantity:
          type: number
          description: How many units of this product are in the cart.
        price:
          type: number
          description: The unit price you are charging for this product.
    PromotionCalculation:
      type: object
      description: |
        The result of calculating a single promotion against a cart. The discount is
        computed server-side so it always matches the merchant's own calculation — you
        never reimplement the math.
      properties:
        promotion_id:
          type: string
          format: uuid
          description: The promotion that was evaluated.
        type:
          type: string
          enum:
            - discount
            - fixed
            - bundle
            - bogo
          description: |
            How the promotion works. `discount` (percentage) and `fixed` are cart-wide
            discounts; `bundle` and `bogo` are computed from the products in the cart.
        eligible:
          type: boolean
          description: Whether the cart qualifies for the promotion.
        discount:
          type: number
          description: |
            The discount amount to subtract from the cart total. `0` when the cart is
            not eligible.
        reason:
          type:
            - string
            - 'null'
          description: |
            When `eligible` is `false`, a short explanation of why the cart does not
            qualify (for example: minimum purchase not met, the promotion is outside its
            active date/time window, or required products are absent). `null` when
            eligible.
    BestPromotion:
      type: object
      description: |
        The single highest-value eligible promotion for a cart — what to auto-apply at
        checkout.
      properties:
        promotion:
          type:
            - object
            - 'null'
          description: |
            The winning promotion, or `null` when no promotion applies to the cart.
