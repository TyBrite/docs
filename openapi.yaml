  /v1/messaging/messages/{id}:
    patch:
      operationId: editMessage
      tags:
        - Messaging
      summary: Edit message
      description: |
        Edits the content of one of the customer's **own** messages. Sets `is_edited = true` and
        records `edited_at`. Cannot edit a soft-deleted message.

        This is a customer-self write: it works with a **publishable** key plus the customer's session
        token in `x-auth-token` (the same browser-origin pattern as cart/wishlist writes). The session
        token proves ownership of the message; a customer can only edit messages they sent.
      security:
        - BearerAuth: []
      parameters:
        - name: x-auth-token
          in: header
          required: true
          description: Customer session access_token. Required to prove ownership of the thread/message being accessed.
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message_content
              properties:
                message_content:
                  type: string
                  minLength: 1
                  example: Updated content for this message.
      responses:
        '200':
          description: Message updated
          headers:
            Tybrite-Environment:
              $ref: '#/components/headers/TybriteEnvironment'
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      message_content:
                        type: string
                      is_edited:
                        type: boolean
                        example: true
                      edited_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
              example:
                message:
                  id: cc64ce9a-51ba-4860-ba1a-85f14899f5bf
                  message_content: Thanks! Also — can I add gift wrapping and a note?
                  is_edited: true
                  edited_at: '2026-06-21T10:16:33.064+00:00'
                  updated_at: '2026-06-21T10:16:33.082663+00:00'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
