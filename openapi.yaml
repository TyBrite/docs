      tags:
        - Authentication
      summary: Update password
      description: |
        Update user password (requires authentication).
        
        **⚠️ SECRET KEY REQUIRED**
        
        This endpoint requires a secret key (tybrite_sk_*). Publishable keys will return 403 Forbidden.
        
        **Special Headers:**
        - `x-auth-token`: **REQUIRED** - Authentication token from login/register response
        
        **Usage:**
        ```
        POST /v1/auth/update-password
        Authorization: Bearer tybrite_sk_live_YOUR_API_KEY
        x-auth-token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        Content-Type: application/json
        
        {
          "password": "newSecurePassword123"
        }
        ```
      security:
        - BearerAuth: []
      parameters:
        - name: x-auth-token
          in: header
          required: true
          description: Authentication token obtained from login/register endpoints
          schema:
            type: string
            example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password updated
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          description: Invalid current password
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "429":
